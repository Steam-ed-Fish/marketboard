# Refresh Pentagon Pizza + Bar Index nightly (~10pm ET = 2am UTC)
name: Refresh pizza index

on:
  schedule:
    - cron: '5 2 * * 2-6'  # 2:05am UTC Tue-Sat (= ~10pm ET Mon-Fri)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Fetch Polymarket data
        run: |
          python scripts/build_polymarket.py --out-dir data

      - name: Run pizza index scraper
        run: |
          python scripts/build_pizza_index.py --out-dir data

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pizza_index.json data/polymarket.json data/polymarket_history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh pizza index [automated]"
          git fetch origin main
          git rebase origin/main
          git push
