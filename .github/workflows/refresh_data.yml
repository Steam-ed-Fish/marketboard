# Refresh dashboard data daily and commit so GitHub Pages serves updated JSON/charts.
name: Refresh dashboard data

on:
  schedule:
    # Run Mon–Fri at 16:30 US Eastern (20:30 UTC); skip weekends
    - cron: '30 20 * * 1-5'
  workflow_dispatch: # Allow manual run

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate data
        run: |
          python scripts/build_data.py --out-dir data
        env:
          TZ: UTC
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

      - name: Update FedWatch data
        run: |
          python scripts/build_fedwatch.py

      - name: Generate briefing
        run: |
          python scripts/generate_briefing.py --out-dir data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh dashboard data [automated]"
          git fetch origin main
          git rebase origin/main
          git push
