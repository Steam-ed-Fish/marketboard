<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Chart Viewer</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #060d1c; color: #d4e4f4; }
        .ticker-table th.sorted-column { background-color: #0c2e52 !important; }
        .ticker-table td.sorted-column { background-color: #071e38; }
        .ticker-list { width: 1200px; background-color: #060d1c; padding: 0; overflow-y: auto; border-right: 1px solid #0d2035; }
        .chart-container { flex: 1; display: flex; flex-direction: column; padding: 10px; background-color: #060d1c; min-height: 0; }
        .group-container { margin-bottom: 10px; border-radius: 8px; border: 1px solid #0d2035; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
        .group-header {
            background: linear-gradient(180deg, #0e2140 0%, #081828 100%);
            padding: 6px 8px; font-weight: bold; font-size: 0.9em;
            display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
            position: sticky; top: 0; z-index: 3; color: #d4e4f4;
            border-top: 1px solid rgba(56,189,248,0.22); border-bottom: 1px solid #0d2035;
            box-shadow: inset 0 1px 0 rgba(56,189,248,0.07), 0 2px 8px rgba(0,0,0,0.35);
            cursor: pointer; user-select: none;
        }
        .group-header:hover { background: linear-gradient(180deg, #122848 0%, #0a1e35 100%); }
        .group-header-title { cursor: pointer; }
        .card-left { display: flex; align-items: center; gap: 6px; }
        .card-chevron { font-size: 0.8rem; color: #2d6080; transition: transform 0.18s; display: inline-block; }
        .card-chevron.open { transform: rotate(90deg); }
        .card-summary { font-size: 0.72rem; color: #2d6080; font-weight: 400; }
        .card-body { display: none; }
        .group-header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
        .group-chart-btn {
            font-size: 11px; font-weight: 600; background-color: #060f1e; color: #7ab8d8;
            padding: 4px 8px; border: 1px solid rgba(56,189,248,0.2); border-radius: 3px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .group-chart-btn:hover { background-color: #0a1e35; border-color: rgba(56,189,248,0.45); color: #38bdf8; }
        .legend { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .legend-item { padding: 2px 6px; border-radius: 6px; font-size: 0.75em; color: white; user-select: none; }
        .ticker-table { width: 100%; border-collapse: collapse; font-size: 0.80em; table-layout: fixed; }
        .ticker-table th:nth-child(1), .ticker-table td:nth-child(1) { width: 90px; overflow: hidden; }
        .ticker-table-glance th:nth-child(1), .ticker-table-glance td:nth-child(1) { width: 140px; }
        .ticker-table th:nth-child(3), .ticker-table td:nth-child(3) { width: 54px; padding: 3px 4px; overflow: hidden; }
        .ticker-table th:nth-child(4), .ticker-table td:nth-child(4) { width: 66px; padding: 3px 4px; overflow: hidden; }
        .ticker-table th:nth-child(5), .ticker-table td:nth-child(5) { width: 66px; padding: 3px 4px; overflow: hidden; }
        .ticker-table th:nth-child(6), .ticker-table td:nth-child(6) { width: 66px; padding: 3px 4px; overflow: hidden; }
        .ticker-table th:nth-child(7), .ticker-table td:nth-child(7) { width: 66px; padding: 3px 4px; overflow: hidden; }
        .ticker-table th:nth-child(8), .ticker-table td:nth-child(8) { width: 72px; padding: 3px 4px; overflow: hidden; }
        .ticker-table th:nth-child(9), .ticker-table td:nth-child(9) { width: 78px; padding: 3px 4px; overflow: hidden; }
        .ticker-table th:nth-child(10), .ticker-table td:nth-child(10) { width: 52px; padding: 3px 2px; overflow: hidden; }
        .ticker-table th:nth-child(11), .ticker-table td:nth-child(11) { width: 90px; padding: 2px 4px; overflow: hidden; }
        .ticker-table th:nth-child(12), .ticker-table td:nth-child(12) { width: 54px; padding: 3px 4px; overflow: hidden; }
        .ticker-table thead { position: sticky; z-index: 2; }
        .ticker-table th {
            text-align: left; padding: 4px 6px; background-color: #071628; cursor: pointer; user-select: none;
            font-weight: bold; border-bottom: 1px solid #0d2035; color: #7ab8d8;
        }
        .ticker-table th:hover { background-color: #0a1e35; color: #38bdf8; }
        .ticker-table th.sortable { cursor: pointer; }
        .ticker-table th.sortable:hover { color: #38bdf8; }
        .ticker-table th.sort-asc::after { content: " ↑"; }
        .ticker-table th.sort-desc::after { content: " ↓"; }
        .ticker-table td { padding: 3px 6px; border-bottom: 1px solid #0a1a2e; vertical-align: middle; color: #d4e4f4; }
        .ticker-row { cursor: pointer; transition: all 0.2s; }
        .ticker-row:hover { background-color: #071828; }
        .ticker-row.active { background-color: #0a2540; }
        .ticker-table td.price-up { color: #10b981 !important; font-weight: bold; }
        .ticker-table td.price-down { color: #ef4444 !important; font-weight: bold; }
        .value-visualization { position: relative; display: inline-block; padding: 2px 3px; border-radius: 3px; min-width: 38px; max-width: 100%; text-align: right; }
        .value-bar { position: absolute; top: 0; height: 100%; border-radius: 3px; opacity: 0.2; z-index: 0; max-width: 100%; }
        .value-bar.positive { background-color: #10b981; left: 0; right: auto; }
        .value-bar.negative { background-color: #ef4444; right: 0; left: auto; }
        .value-text { position: relative; z-index: 1; }
        .rs-chart { width: 100%; max-width: 100px; height: 22px; display: block; object-fit: contain; }
        .tradingview-widget-container { flex: 1; min-height: 0; }
        .key-hint { font-size: 11px; color: #2d6080; margin-top: 15px; padding: 5px; background: linear-gradient(180deg, #0e2140 0%, #081828 100%); border-radius: 3px; position: sticky; bottom: 0; border: 1px solid rgba(56,189,248,0.15); }
        .long-etf { color: #4ade80; cursor: pointer; text-decoration: underline; }
        .short-etf { color: #f87171; cursor: pointer; text-decoration: underline; }
        .etf-list { white-space: nowrap; font-size: 0.8em; }
        .etf-list span:hover { font-weight: bold; }
        .ticker-label { display: inline-block; padding: 2px 7px; border-radius: 12px; background-color: #0e2540; color: #d4e4f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; vertical-align: middle; }
        .holdings-btn {
            font-size: 10px; font-weight: 600; background-color: #060f1e; color: #3d7090;
            width: 18px; height: 18px; padding: 0; border: 1px solid #1a3550; border-radius: 50%;
            cursor: pointer; margin-left: 4px; flex-shrink: 0;
        }
        .holdings-btn:hover { background-color: #0a1e35; color: #38bdf8; }
        .hcol-btn {
            font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px;
            border: none; cursor: pointer; color: #fff; letter-spacing: 0.02em; display: block; width: 100%;
        }
        .hcol-btn-up   { background-color: #065f46; }
        .hcol-btn-up:hover { background-color: #10b981; }
        .hcol-btn-down { background-color: #7f1d1d; }
        .hcol-btn-down:hover { background-color: #ef4444; }
        .hcol-btn-flat { background-color: #0e2540; }
        .hcol-btn-flat:hover { background-color: #1a3550; }
        .abc-rating { display: inline-block; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; font-weight: bold; color: white; }
        .abc-a { background-color: #0ea5e9; }
        .abc-b { background-color: #10b981; }
        .abc-c { background-color: #f59e0b; }
        .economic-events { margin-bottom: 10px; }
        .events-button {
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            background: linear-gradient(180deg, #0e2140 0%, #081828 100%);
            color: #7ab8d8;
            padding: 8px 12px;
            border: 1px solid rgba(56,189,248,0.2);
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .events-button:hover { background: linear-gradient(180deg, #122848 0%, #0a1e35 100%); border-color: rgba(56,189,248,0.45); color: #38bdf8; }
        .events-tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: #3d7090; cursor: pointer; padding: 4px 12px; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.03em; }
        .events-tab.active { color: #d4e4f4; border-bottom-color: #38bdf8; }
        .events-tab:hover { color: #d4e4f4; }
        .event-item {
            padding: 10px 12px; border-bottom: 1px solid #0a1e35; background-color: #060d1c;
            font-family: Arial, sans-serif; font-size: 0.8em; line-height: 1.5;
        }
        .event-item:hover { background-color: #071e38; }
        .event-item:last-child { border-bottom: none; }
        .event-item .event-datetime { font-weight: bold; color: #38bdf8; }
        .event-item .event-name { color: #a8c8e0; }
        /* Daily Briefing card */
        .briefing-card { border: 1px solid rgba(56,189,248,0.25); border-radius: 6px; margin: 8px; overflow: hidden; background: linear-gradient(180deg, #071828 0%, #050e1a 100%); }
        .briefing-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: linear-gradient(90deg, #0a2545 0%, #071828 100%); border-bottom: 1px solid rgba(56,189,248,0.15); cursor: pointer; }
        .briefing-label { font-size: 0.72rem; font-weight: 700; color: #38bdf8; letter-spacing: 0.08em; text-transform: uppercase; }
        .briefing-meta { font-size: 0.65rem; color: #2d6080; margin-left: 8px; }
        .briefing-body { padding: 12px 14px; font-size: 0.78rem; line-height: 1.65; color: #c8d8e8; white-space: pre-wrap; font-family: Arial, sans-serif; }
        .briefing-body .b-section { color: #38bdf8; font-weight: 700; }
        .briefing-toggle { font-size: 0.62rem; color: #2d6080; cursor: pointer; padding: 2px 7px; border: 1px solid #0d2540; border-radius: 3px; background: transparent; flex-shrink: 0; }
        .briefing-toggle:hover { color: #38bdf8; border-color: rgba(56,189,248,0.3); }
        .briefing-divider { padding: 5px 12px; font-size: 0.65rem; font-weight: 700; color: #2d6080; letter-spacing: 0.06em; border-top: 1px solid #0a1e35; margin-top: 2px; }
        .loading-msg { padding: 20px; text-align: center; color: #9ca3af; }
        .seven-detail-row > td { padding: 0 !important; border-top: 2px solid #38bdf8; border-bottom: 2px solid #38bdf8; }
        .seven-detail-panel { background: #040c1a; }
        .seven-detail-header { padding: 6px 12px; font-size: 0.75rem; font-weight: 700; color: #38bdf8; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid #0a2545; display: flex; align-items: center; gap: 10px; }
        .seven-detail-header .sdh-stats { font-weight: 400; color: #2d6080; font-size: 0.7rem; letter-spacing: 0; text-transform: none; }
        .seven-detail-panel .ticker-table { margin: 0; width: auto; min-width: 100%; border-collapse: collapse; }
        .seven-detail-panel .ticker-table th { background: #050c18; color: #2d6080; font-size: 0.68rem; padding: 4px 8px; white-space: nowrap; border-bottom: 1px solid #091a30; }
        .seven-detail-panel .ticker-table td { padding: 4px 8px; font-size: 0.78rem; white-space: nowrap; border-bottom: 1px solid #040e1c; }
        .seven-detail-panel .ticker-row:hover > td { background: #0a2545; }
        .seven-detail-panel .ticker-row:last-child td { border-bottom: none; }
        .ticker-row.seven-expanded { background: #071e38 !important; }
        .ticker-row.seven-expanded > td:first-child { border-left: 3px solid #38bdf8; }
        .industry-sector-divider.ind-expanded { background: #071e38 !important; }
        .industry-sector-divider.ind-expanded > td:first-child { border-left: 3px solid #38bdf8; }
        .industry-detail-row > td { padding: 0 !important; border-top: 2px solid #38bdf8; border-bottom: 2px solid #38bdf8; }
        .market-breadth { margin-bottom: 10px; position: relative; }
        .multi-chart-panel { flex: 1; min-height: 0; overflow: auto; display: none; }
        .multi-group-title { margin: 8px 0 4px; font-size: 0.85rem; font-weight: 600; color: #9ca3af; }
        .multi-chart-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
        .econ-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .econ-modal {
            background: #060d1c; border-radius: 8px; border: 1px solid rgba(56,189,248,0.18);
            padding: 8px; max-width: 440px; width: 440px; max-height: 90vh; overflow: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(56,189,248,0.06);
        }
        .econ-modal-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
            font-size: 0.9rem; font-weight: 600; color: #d4e4f4;
        }
        .econ-modal-close { background: transparent; border: none; color: #2d6080; cursor: pointer; font-size: 1.2rem; padding: 0 4px; }
        .econ-modal-close:hover { color: #38bdf8; }
        .holdings-modal-overlay {
            position: fixed; inset: 0; background: transparent; display: none; z-index: 9999;
        }
        .holdings-modal {
            position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
            background: #060d1c; border-radius: 10px; border: 1px solid rgba(56,189,248,0.18);
            padding: 0; width: 280px; max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.85), 0 0 0 1px rgba(56,189,248,0.06);
            overflow: hidden;
        }
        .holdings-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: linear-gradient(180deg, #0e2140 0%, #081828 100%);
            border-bottom: 1px solid rgba(56,189,248,0.15); font-weight: 700; font-size: 0.82em;
            color: #38bdf8; letter-spacing: 0.03em; text-transform: uppercase;
        }
        .holdings-modal-close {
            background: transparent; border: none; color: #2d6080; cursor: pointer;
            font-size: 1rem; line-height: 1; padding: 0 2px;
            transition: color 0.15s;
        }
        .holdings-modal-close:hover { color: #38bdf8; }
        .holdings-list { overflow-y: auto; font-size: 0.8em; max-height: 320px; }
        .holdings-item {
            display: grid; grid-template-columns: 20px 1fr auto;
            align-items: center; gap: 8px;
            padding: 5px 12px; border-bottom: 1px solid #091a30;
            cursor: pointer; transition: background 0.1s;
        }
        .holdings-item:last-child { border-bottom: none; }
        .holdings-item:hover { background: #071e38; }
        .holdings-item.active { background: #0a2545; }
        .holdings-rank { color: #1a3550; font-size: 0.75em; text-align: right; font-variant-numeric: tabular-nums; }
        .holdings-symbol { font-weight: 700; color: #38bdf8; font-size: 0.95em; letter-spacing: 0.02em; }
        .holdings-weight { color: #10b981; }
        .holdings-gain { color: #10b981; }
        .holdings-loss { color: #ef4444; }
        .holdings-neutral { color: #3d7090; }
        .holdings-loading, .holdings-error { padding: 20px; text-align: center; }
        .holdings-error { color: #ef4444; }
        .gap-bar { display: flex; gap: 2px; align-items: center; justify-content: center; }
        .gap-dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }
        .gap-dot-up { background: #10b981; }
        .gap-dot-down { background: #ef4444; }
        .gap-dot-none { background: #0d2035; }
        .rel-perf-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        .rel-perf-table thead th { padding: 5px 8px; color: #2d6080; font-weight: 600; text-align: right; border-bottom: 1px solid #0a2035; }
        .rel-perf-table thead th:first-child { text-align: left; }
        .rel-perf-row td { padding: 5px 8px; border-bottom: 1px solid #0a1e35; }
        .rel-perf-row:last-child td { border-bottom: none; }
        .rel-perf-row:hover { background: #071828; }
        .rel-perf-name { color: #d4e4f4; white-space: nowrap; }
        .rel-perf-val { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 60px; }
        .rel-ticker-a { color: #38bdf8; font-weight: 700; font-size: 0.9em; }
        .rel-ticker-b { color: #3d7090; font-weight: 700; font-size: 0.9em; }
        .rel-highlight-pos { background: #10b98133; border-radius: 3px; padding: 1px 4px; }
        .rel-highlight-neg { background: #ef444433; border-radius: 3px; padding: 1px 4px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060d1c; }
        ::-webkit-scrollbar-thumb { background: #0e2540; border-radius: 4px; }
        /* Fear & Greed */
        .fg-gauge-wrap { display:flex; flex-direction:column; align-items:center; margin-bottom:14px; }
        .fg-score-num  { font-size:2rem; font-weight:700; margin-top:2px; }
        .fg-sentiment  { font-size:0.85rem; color:#3d7090; }
        .fg-grid       { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 2px; }
        .fg-card       { background:#071828; border-radius:6px; padding:8px 10px; border:1px solid #0a1e35; }
        .fg-card-lbl   { font-size:0.68rem; color:#2d6080; margin-bottom:3px; }
        .fg-card-score { font-size:1.05rem; font-weight:700; }
        .fg-card-det   { font-size:0.63rem; color:#1a3550; margin-top:2px; }
        .fg-bar-bg     { background:#0a1e35; border-radius:3px; height:5px; margin-top:5px; }
        .fg-bar-fill   { height:5px; border-radius:3px; }
        /* FRED Macro Monitor */
        .fred-signal-banner { display:flex; gap:5px; flex-wrap:wrap; padding:10px 12px 4px; }
        .fred-pill { font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:3px; letter-spacing:0.04em; text-transform:uppercase; }
        .fred-pill-hawkish   { background:rgba(239,68,68,.12);  color:#ef4444; border:1px solid rgba(239,68,68,.3); }
        .fred-pill-dovish    { background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.3); }
        .fred-pill-tightening{ background:rgba(245,158,11,.12); color:#f59e0b; border:1px solid rgba(245,158,11,.3); }
        .fred-pill-neutral   { background:rgba(56,189,248,.10); color:#38bdf8; border:1px solid rgba(56,189,248,.25); }
        .fred-pill-mixed     { background:rgba(139,92,246,.12); color:#8b5cf6; border:1px solid rgba(139,92,246,.3); }
        .fred-narrative { padding:2px 12px 10px; font-size:0.78rem; color:#7ab8d8; border-bottom:1px solid #0a1e35; font-style:italic; }
        .fred-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:8px; }
        .fred-card { background:#071828; border-radius:6px; padding:7px 10px 6px; border-left:3px solid #1a3550; }
        .fred-card.hawkish    { border-left-color:#ef4444; }
        .fred-card.dovish     { border-left-color:#10b981; }
        .fred-card.tightening { border-left-color:#f59e0b; }
        .fred-card.mixed      { border-left-color:#8b5cf6; }
        .fred-card.neutral    { border-left-color:#38bdf8; }
        .fred-card-top { display:flex; justify-content:space-between; align-items:baseline; }
        .fred-card-label { font-size:0.63rem; color:#2d6080; text-transform:uppercase; letter-spacing:0.05em; }
        .fred-card-signal { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; }
        .fred-card-value { font-size:1.15rem; font-weight:700; color:#d4e4f4; line-height:1.2; margin-top:1px; }
        .fred-card-unit { font-size:0.7rem; font-weight:400; color:#3d7090; margin-left:1px; }
        .fred-card-change { font-size:0.65rem; margin-top:1px; }
        .fred-sparkline { width:100%; height:26px; object-fit:contain; margin-top:4px; display:block; }
    </style>
</head>
<body>
    <div class="ticker-list">
        <div style="position:relative;margin-bottom:10px">
            <button class="events-button" type="button" onclick="openEventsModal()">📅 EVENTS</button>
        </div>
        <div style="position:relative;margin-bottom:10px">
            <button class="events-button" type="button" onclick="openFearGreed()">🌡️ FEAR &amp; GREED</button>
        </div>
        <div class="market-breadth" style="position:relative;margin-bottom:10px">
            <button class="events-button" type="button" onclick="openMarketBreadth()">📊 MARKET BREADTH</button>
        </div>
        <div id="groups-container"></div>
        <div class="key-hint">↑ ↓ Navigate · h Holdings · Data via CI · Yahoo Finance</div>
    </div>
    <div id="events-modal-overlay" class="econ-modal-overlay" onclick="closeEventsModal(event)">
        <div class="econ-modal" onclick="event.stopPropagation()" style="max-width:500px;width:500px">
            <div class="econ-modal-header">
                <div style="display:flex;gap:0;border-bottom:1px solid #0a1e35;margin-bottom:-8px">
                    <button type="button" class="events-tab active" id="tab-macro" onclick="switchEventsTab('macro')">Macro Events</button>
                    <button type="button" class="events-tab" id="tab-cal" onclick="switchEventsTab('cal')">Econ Calendar</button>
                    <button type="button" class="events-tab" id="tab-fred" onclick="switchEventsTab('fred')">📊 FRED Macro</button>
                    <button type="button" class="events-tab" id="tab-poly" onclick="switchEventsTab('poly')">🎲 Polymarket</button>
                </div>
                <button type="button" class="econ-modal-close" onclick="closeEventsModal(event)">&times;</button>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
(function() {
    let chartWidget = null;
    let currentIndex = 0;
    let allTickerRows = [];
    let currentSortStates = {};
    let snapshot = null;
    let meta = null;
    let multiChartMode = false;
    let defaultSymbol = 'QQQE';
    let currentHoldingsSymbol = null;
    let holdingsList = [];
    let holdingsIndex = -1;

    function safeGroupId(name) {
        return name.replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }
    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function vizWidth(value, minVal, maxVal) {
        if (value == null) return 0;
        if (minVal >= maxVal) return 0;
        if (value >= 0) {
            if (maxVal <= 0) return 0;
            return Math.min(100, Math.max(0, (value / maxVal) * 100));
        }
        if (minVal >= 0) return 0;
        return Math.min(100, Math.max(0, (Math.abs(value) / Math.abs(minVal)) * 100));
    }

    function renderEvents(events) {
        var el = document.getElementById('events-modal-content');
        if (!el) return;
        var html = '';
        var calEvents = events || [];

        // Briefing card — always first entry if present
        if (calEvents.length > 0 && calEvents[0].type === 'briefing') {
            var b = calEvents[0];
            calEvents = calEvents.slice(1);
            // Highlight ALL-CAPS section labels (e.g. "MARKET PULSE —")
            var rawText = (b.text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            var fmtText = rawText.replace(/^([A-Z][A-Z &]+—)/gm, '<span class="b-section">$1</span>');
            html += '<div class="briefing-card">' +
                '<div class="briefing-header" onclick="toggleBriefing()">' +
                    '<div><span class="briefing-label">&#128200; Intelligence Briefing</span>' +
                    '<span class="briefing-meta">' + (b.date || '') + ' ' + (b.time || '') + ' UTC</span></div>' +
                    '<button type="button" class="briefing-toggle" id="briefing-toggle-btn">&#9660; collapse</button>' +
                '</div>' +
                '<div id="briefing-body" class="briefing-body">' + fmtText + '</div>' +
            '</div>';
            if (calEvents.length > 0) {
                html += '<div class="briefing-divider">UPCOMING MACRO EVENTS</div>';
            }
        }

        if (calEvents.length === 0 && !html) {
            el.innerHTML = '<div class="event-item">No high-importance U.S. macro events in the next 7 days.</div>';
            return;
        }
        html += calEvents.map(function(e) {
            return '<div class="event-item"><span class="event-datetime">' + (e.date || '') + ' ' + (e.time || '') + '</span><span class="event-name"> · ' + (e.event || '') + '</span></div>';
        }).join('');
        el.innerHTML = html;
    }
    window.toggleBriefing = function() {
        var body = document.getElementById('briefing-body');
        var btn  = document.getElementById('briefing-toggle-btn');
        if (!body) return;
        var collapsed = body.style.display === 'none';
        body.style.display = collapsed ? '' : 'none';
        if (btn) btn.innerHTML = collapsed ? '&#9660; collapse' : '&#9658; expand';
    };
    window.openEventsModal = function() {
        var ov = document.getElementById('events-modal-overlay');
        if (ov) ov.style.display = 'flex';
    };
    window.closeEventsModal = function(ev) {
        if (ev) ev.preventDefault();
        var ov = document.getElementById('events-modal-overlay');
        if (ov) ov.style.display = 'none';
    };
    window.switchEventsTab = function(tab) {
        document.getElementById('events-tab-macro').style.display = tab === 'macro' ? '' : 'none';
        document.getElementById('events-tab-cal').style.display  = tab === 'cal'   ? '' : 'none';
        document.getElementById('events-tab-fred').style.display = tab === 'fred'  ? '' : 'none';
        document.getElementById('events-tab-poly').style.display = tab === 'poly'  ? '' : 'none';
        document.getElementById('tab-macro').classList.toggle('active', tab === 'macro');
        document.getElementById('tab-cal').classList.toggle('active',   tab === 'cal');
        document.getElementById('tab-fred').classList.toggle('active',  tab === 'fred');
        document.getElementById('tab-poly').classList.toggle('active',  tab === 'poly');
        if (tab === 'fred') renderMacroFred();
        if (tab === 'poly') renderPolymarket();
    };

    function getGroupLabelClass(groupName, ticker) {
        if (groupName === 'Industries' && meta && meta.Industries_COLORS && meta.Industries_COLORS[ticker])
            return 'ticker-label-' + ticker;
        var safe = groupName.replace(/\s+/g, '-').replace(/&/g, '-');
        return 'ticker-label-' + safe;
    }

    function _cardOpen(id) {
        try { return !!(JSON.parse(localStorage.getItem('dash_cards') || '{}')[id]); } catch(e) { return false; }
    }
    function _cardSave(id, open) {
        try { var s = JSON.parse(localStorage.getItem('dash_cards') || '{}'); s[id] = open; localStorage.setItem('dash_cards', JSON.stringify(s)); } catch(e) {}
    }
    window.toggleCard = function(id, ev) {
        if (ev) ev.stopPropagation();
        var body = document.getElementById('card-body-' + id);
        var chev = document.getElementById('card-chev-' + id);
        if (!body) return;
        var nowOpen = body.style.display !== 'none';
        body.style.display = nowOpen ? 'none' : 'block';
        if (chev) chev.classList.toggle('open', !nowOpen);
        _cardSave(id, !nowOpen);
    };

    function renderRelativePerf() {
        var pairs = [
            ["Tangibles vs. Intangibles",   "DBC",  "IGV"],
            ["AI 100 vs. Equal Weight",      "QQQ",  "RSP"],
            ["Cyclicals vs. Defensives",     "XLY",  "XLP"],
            ["US vs. International",         "SPY",  "EFA"],
            ["Pure Value vs. Growth",        "IVE",  "IVW"],
            ["Early Cycle vs. Late Cycle",   "XLB",  "XLU"],
            ["Large Cap vs. Small Cap",      "SPY",  "IWM"],
            ["Software vs. Semis",           "IGV",  "SMH"]
        ];
        var lookup = {};
        if (snapshot && snapshot.groups) {
            Object.values(snapshot.groups).forEach(function(tickers) {
                tickers.forEach(function(t) { lookup[t.ticker] = t; });
            });
        }
        function relFmt(a, b, field) {
            if (!a || !b || a[field] == null || b[field] == null) return '<span style="color:#4b5563">-</span>';
            var val = a[field] - b[field];
            var str = (val > 0 ? '+' : '') + val.toFixed(2) + '%';
            var cls = val > 0 ? 'price-up' : (val < 0 ? 'price-down' : '');
            var hlCls = Math.abs(val) >= 3 ? (val > 0 ? ' rel-highlight-pos' : ' rel-highlight-neg') : '';
            return '<span class="' + cls + hlCls + '">' + str + '</span>';
        }
        var _rpOpen = _cardOpen('rel-perf');
        var html = '<div class="group-container" id="group-rel-perf">';
        html += '<div class="group-header" onclick="toggleCard(\'rel-perf\',event)">';
        html += '<div class="card-left"><span class="card-chevron' + (_rpOpen ? ' open' : '') + '" id="card-chev-rel-perf">&#9658;</span>';
        html += '<span class="group-header-title">Relative Performance</span>';
        html += '<span class="card-summary">' + pairs.length + ' pairs</span></div>';
        html += '</div>';
        html += '<div class="card-body" id="card-body-rel-perf" style="' + (_rpOpen ? '' : 'display:none') + '">';
        html += '<table class="rel-perf-table"><thead><tr>';
        html += '<th>Pair</th><th>Daily</th><th>5D</th><th>YTD</th></tr></thead><tbody>';
        pairs.forEach(function(p) {
            var name = p[0], tA = p[1], tB = p[2];
            var a = lookup[tA], b = lookup[tB];
            html += '<tr class="rel-perf-row">';
            html += '<td class="rel-perf-name"><span class="rel-ticker-a">' + tA + '</span> <span style="color:#4b5563">vs.</span> <span class="rel-ticker-b">' + tB + '</span> &nbsp;<span style="color:#6b7280;font-size:0.85em">' + name + '</span></td>';
            html += '<td class="rel-perf-val">' + relFmt(a, b, 'daily') + '</td>';
            html += '<td class="rel-perf-val">' + relFmt(a, b, '5d') + '</td>';
            html += '<td class="rel-perf-val">' + relFmt(a, b, 'ytd') + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    window.showThemeTooltip = function(e, dataJson) {
        var tt = document.getElementById('theme-constituent-tooltip');
        var constituents = JSON.parse(dataJson);
        var inner = constituents.map(function(c) {
            var color = c.d > 0 ? '#10b981' : (c.d < 0 ? '#ef4444' : '#9ca3af');
            var str = c.d != null ? (c.d > 0 ? '+' : '') + c.d.toFixed(2) + '%' : '-';
            return '<div style="display:flex;justify-content:space-between;gap:16px"><span style="color:#9ca3af">' + c.t + '</span><span style="color:' + color + ';font-weight:600">' + str + '</span></div>';
        }).join('');
        tt.innerHTML = inner;
        tt.style.display = 'block';
        tt.style.left = (e.clientX + 12) + 'px';
        tt.style.top = (e.clientY - 10) + 'px';
    };
    window.hideThemeTooltip = function() {
        document.getElementById('theme-constituent-tooltip').style.display = 'none';
    };

    function renderAIThemes() {
        if (!snapshot || !snapshot.themes || !snapshot.themes.length) return '';
        function vw(val, lo, hi) {
            if (val == null) return 0;
            var span = hi - lo; if (!span) return 50;
            return Math.min(100, Math.max(0, Math.abs(val) / (Math.max(Math.abs(lo), Math.abs(hi))) * 100));
        }
        function cell(val, lo, hi) {
            if (val == null) return '<td>N/A</td>';
            var cl = val > 0 ? 'price-up' : (val < 0 ? 'price-down' : '');
            var bar = val >= 0 ? 'positive' : 'negative';
            return '<td class="' + cl + '"><div class="value-visualization"><div class="value-bar ' + bar + '" style="width:' + vw(val,lo,hi) + '%"></div><span class="value-text">' + (val >= 0 ? '+' : '') + val.toFixed(2) + '%</span></div></td>';
        }
        var _atGreen = snapshot.themes.filter(function(t){return (t.daily||0)>0;}).length;
        var _atAvg = snapshot.themes.reduce(function(s,t){return s+(t.daily||0);},0) / snapshot.themes.length;
        var _atSign = _atAvg >= 0 ? '+' : '';
        var _atOpen = _cardOpen('ai-themes');
        var html = '<div class="group-container" id="group-ai-themes">';
        html += '<div class="group-header" onclick="toggleCard(\'ai-themes\',event)">';
        html += '<div class="card-left"><span class="card-chevron' + (_atOpen ? ' open' : '') + '" id="card-chev-ai-themes">&#9658;</span>';
        html += '<span class="group-header-title">Themes</span>';
        html += '<span class="card-summary">' + _atGreen + '/' + snapshot.themes.length + ' green &middot; ' + _atSign + _atAvg.toFixed(2) + '% avg</span></div>';
        html += '</div>';
        html += '<div class="card-body" id="card-body-ai-themes" style="' + (_atOpen ? '' : 'display:none') + '">';
        html += '<table class="ticker-table"><thead><tr>';
        html += '<th>Theme</th><th>Holdings</th><th>Grade</th><th>Daily</th><th>Intra</th><th>WTD</th><th>5D</th><th>20D</th><th>YTD</th>';
        html += '<th>Vol%</th><th>Vol Chart</th><th>ATR%</th><th>ATRx</th><th>1M-VARS</th>';
        html += '</tr></thead><tbody>';
        snapshot.themes.forEach(function(t) {
            var cd = t.constituent_daily || {};
            var cdArr = t.tickers.map(function(tk) { return {t: tk, d: cd[tk] != null ? cd[tk] : null}; });
            var dataJson = JSON.stringify(cdArr).replace(/"/g, '&quot;');
            html += '<tr class="ticker-row">';
            html += '<td><span class="ticker-label" style="background:#2d3748;font-size:0.85em">' + t.name + '</span></td>';
            var _thcls = t.daily > 0 ? 'hcol-btn-up' : (t.daily < 0 ? 'hcol-btn-down' : 'hcol-btn-flat');
            html += '<td style="padding:3px 4px"><button type="button" class="hcol-btn ' + _thcls + '" onmouseenter="showThemeTooltip(event,this.dataset.cd)" onmouseleave="hideThemeTooltip()" data-cd="' + dataJson + '" onclick="event.stopPropagation()" title="Hover for constituent performance">h</button></td>';
            html += '<td>-</td>';
            html += cell(t.daily, -5, 5);
            html += cell(t.intra, -5, 5);
            html += cell(t.wtd, -10, 10);
            html += cell(t['5d'], -10, 10);
            html += cell(t['20d'], -20, 20);
            html += cell(t.ytd, -30, 30);
            html += '<td>' + (t.vol_ratio != null ? t.vol_ratio.toFixed(2) + 'x' : 'N/A') + '</td>';
            html += '<td>' + (t.vol_chart ? '<img src="' + t.vol_chart + '" class="rs-chart" alt="Vol">' : '-') + '</td>';
            html += '<td>' + (t.atr_pct != null ? t.atr_pct.toFixed(1) + '%' : 'N/A') + '</td>';
            html += '<td>' + (t.dist_sma50_atr != null ? t.dist_sma50_atr.toFixed(2) : 'N/A') + '</td>';
            html += '<td>' + (t.rs != null ? Math.round(t.rs) + '%' : 'N/A') + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    function renderGroups() {
        if (!snapshot || !snapshot.groups) {
            document.getElementById('groups-container').innerHTML = '<div class="loading-msg">LOADING DATA...</div>';
            return;
        }
        var html = renderRelativePerf() + renderAIThemes();
        var groupOrder = Object.keys(snapshot.groups);
        for (var g = 0; g < groupOrder.length; g++) {
            var groupName = groupOrder[g];
            var rows = snapshot.groups[groupName];
            if (!rows || rows.length === 0) continue;
            if (groupName !== 'The 7s at a Glance' && groupName.indexOf('The ') === 0 && groupName.slice(-2) === ' 7') continue;
            var safeId = safeGroupId(groupName);
            var ranges = (snapshot.column_ranges && snapshot.column_ranges[groupName]) || { daily: [-10,10], intra: [-10,10], '5d': [-20,20], '20d': [-30,30] };
            var gnEsc = groupName.replace(/'/g, "\\'");
            var _grpNonRrg = rows.filter(function(x){return !x.is_rrg_row;});
            var _grpGreen = _grpNonRrg.filter(function(x){return (x.daily||0)>0;}).length;
            var _grpTotal = _grpNonRrg.length;
            var _grpAvg = _grpTotal > 0 ? _grpNonRrg.reduce(function(acc,x){return acc+(x.daily||0);},0)/_grpTotal : 0;
            var _grpAvgStr = (_grpAvg>=0?'+':'')+_grpAvg.toFixed(2)+'%';
            var _grpOpen = _cardOpen(safeId);
            html += '<div class="group-container" id="group-' + safeId + '">';
            html += '<div class="group-header" onclick="toggleCard(\'' + safeId + '\',event)">';
            html += '<div class="card-left"><span class="card-chevron' + (_grpOpen ? ' open' : '') + '" id="card-chev-' + safeId + '">&#9658;</span>';
            html += '<span class="group-header-title">' + groupName + '</span>';
            html += '<span class="card-summary">' + _grpGreen + '/' + _grpTotal + ' green &middot; ' + _grpAvgStr + ' avg</span></div>';
            if (groupName === 'The 7s at a Glance') {
                var _rrgRow = null;
                for (var _ri = 0; _ri < rows.length; _ri++) { if (rows[_ri].is_rrg_row) { _rrgRow = rows[_ri]; break; } }
                if (_rrgRow && _rrgRow.rrg_chart) {
                    html += '<button type="button" class="group-chart-btn" onclick="event.stopPropagation();showRrgChart(\'' + _rrgRow.rrg_chart.replace(/'/g, "\\'") + '\', this)">Rotation Chart</button>';
                }
            } else {
                html += '<div class="group-header-actions" onclick="event.stopPropagation()">';
                html += '<button type="button" class="group-chart-btn" data-group="' + gnEsc + '" onclick="toggleGroupChart(\'' + gnEsc + '\', this)">MultiChart</button>';
                html += '</div>';
            }
            html += '</div>';
            var _isGlance = (groupName === 'The 7s at a Glance');
            html += '<div class="card-body" id="card-body-' + safeId + '" style="' + (_grpOpen ? '' : 'display:none') + '">';
            html += '<table class="ticker-table' + (_isGlance ? ' ticker-table-glance' : '') + '" data-group="' + escapeHtml(groupName) + '"><thead><tr>';
            var th = function(key, label, tip) { return '<th class="sortable" data-sort-by="' + key + '" title="' + (tip || '') + '&#10;Click to sort">' + label + '</th>'; };
            html += th('symbol', 'Ticker', 'Ticker symbol');
            html += '<th title="Nearest support/resistance level within 2% of current price.\n\nHow it\'s computed:\n1. scipy find_peaks() detects swing highs (resistance) and swing lows (support) on 1 year of daily OHLC data, requiring at least 5 bars between peaks.\n2. Nearby levels within 1.5% of each other are merged into a single zone.\n3. Each zone is scored by how many OHLC values touched it (within 0.5%).\n4. Top 3 support + top 3 resistance zones are kept, sorted nearest-first.\n5. A badge appears here when the current price is within 2% of any level.\n\nAmber R = approaching resistance from below.\nBlue S = sitting just above support.\nNo badge = nearest level is >2% away.">S/R</th>';
            html += '<th title="Click to view holdings. For The 7s at a Glance, hover to see constituent performance.">Holdings</th>';
            html += th('abc', 'Grade', 'ABC trend rating:\nA = EMA10 > EMA20 > SMA50 (uptrend)\nB = mixed signals\nC = downtrend');
            html += th('daily', 'Daily', 'Today\'s price change %');
            html += th('intra', 'Intra', 'Intraday % change (open to current)');
            html += th('wtd', 'WTD', 'Week-to-date % change');
            html += th('5d', '5D', '5-day % change');
            html += th('20d', '20D', '20-day % change');
            html += th('ytd', 'YTD', 'Year-to-date % change');
            html += th('vol_ratio', 'Vol%', 'Today\'s volume vs 20-day average volume');
            html += '<th title="Volume trend: last 20 days vs 20-day average. Red bars = 2× avg or higher.">Vol Chart</th>';
            html += th('atr_pct', 'ATR%', '14-period Average True Range as % of price (daily volatility measure)');
            html += th('dist_sma50_atr', 'ATRx', 'Distance from SMA50 measured in 14-period ATR units.\nPositive = above SMA50, negative = below.');
            html += th('rs', '1M-VARS', 'Volatility Adjusted Relative Strength vs SPY over last 21 days (0–100%)');
            html += th('rs', 'VARS', 'Volatility Adjusted Relative Strength vs SPY (raw score)');
            if (!_isGlance) {
                html += th('letf', 'LETF', 'Leveraged ETF exists for this ticker (long/short)');
                html += '<th title="Full candle gap in last 5 trading days.\nGreen = entire candle above previous candle.\nRed = entire candle below previous candle.">Gap</th>';
            }
            html += '</tr></thead><tbody id="' + safeId + '-body">';
            var _lastSector = null;
            // Pre-compute per-sector stats for Industries (all numeric columns)
            var _secStats = {};
            if (groupName === 'Industries') {
                rows.forEach(function(r) {
                    if (!r.sector) return;

    function buildMultiChartForGroup(groupName) {
        var panel = document.getElementById('multi-chart-panel');
        if (!panel) return;
        panel.innerHTML = '';
        var gc = document.getElementById('group-' + safeGroupId(groupName));
        if (!gc) return;
        var table = gc.querySelector('table.ticker-table');
        if (!table) return;
        var rows = [].slice.call(table.querySelectorAll('.ticker-row'));
        if (!rows.length) return;
        var title = document.createElement('div');
        title.className = 'multi-group-title';
        title.textContent = groupName;
        var grid = document.createElement('div');
        grid.className = 'multi-chart-grid';
        rows.forEach(function(row) {
            var sym = (row.getAttribute('data-symbol') || '').trim();
            if (!sym) return;
            var wrap = document.createElement('div');
            wrap.className = 'tradingview-widget-container';
            wrap.style.height = '325px';
            wrap.style.width = '100%';
            var inner = document.createElement('div');
            inner.className = 'tradingview-widget-container__widget';
            inner.style.height = '100%';
            inner.style.width = '100%';
            inner.style.border = '1px solid rgba(255,255,255,0.06)';
            inner.style.borderRadius = '4px';
            wrap.appendChild(inner);
            var script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
            script.async = true;
            script.textContent = JSON.stringify({
                allow_symbol_change: true, calendar: false, details: false, hide_side_toolbar: true,
                hide_top_toolbar: false, hide_legend: true, hide_volume: true, hotlist: false,
                interval: 'D', locale: 'en', save_image: false, style: '1', symbol: sym, theme: 'dark',
                timezone: 'America/Toronto', backgroundColor: '#1a1a1a',
                gridColor: 'rgba(242, 242, 242, 0.06)', watchlist: [], withdateranges: false,
                studies: ['STD;MA%Ribbon'], autosize: true
            });
            inner.appendChild(script);
            grid.appendChild(wrap);
        });
        panel.appendChild(title);
        panel.appendChild(grid);
    }

    window.openGroupMultiChart = function(groupName) {
        multiChartMode = true;
        var singlePanel = document.getElementById('single-chart-panel');
        var multiPanel = document.getElementById('multi-chart-panel');
        if (chartWidget) { try { chartWidget.remove(); } catch (e) {} chartWidget = null; }

        if (multiPanel) { multiPanel.style.display = 'block'; buildMultiChartForGroup(groupName); }
    };
    window.openSingleChart = function() {
        multiChartMode = false;
        var singlePanel = document.getElementById('single-chart-panel');
        var multiPanel = document.getElementById('multi-chart-panel');
        if (singlePanel) singlePanel.style.display = 'flex';
        if (multiPanel) { multiPanel.innerHTML = ''; multiPanel.style.display = 'none'; }

    function updateGroupChartButtons(activeGroup) {
        document.querySelectorAll('.group-header-actions .group-chart-btn').forEach(function(btn) {
            btn.textContent = (activeGroup && btn.getAttribute('data-group') === activeGroup) ? 'SingleChart' : 'MultiChart';
        });

    window.toggleGroupChart = function(groupName, btnEl) {

    function renderFearGreed() {
        var el = document.getElementById('fear-greed-content');
        if (!el) return;
        var fg = snapshot && snapshot.fear_greed;
        if (!fg) { el.innerHTML = '<div style="padding:16px;color:#9ca3af">No data — run build_data.py.</div>'; return; }
        var score = fg.score, sentiment = fg.sentiment;
        var col = score<=20?'#ef4444':score<=40?'#f97316':score<=60?'#eab308':score<=80?'#22c55e':'#10b981';
        // SVG gauge
        var cx=120,cy=110,r=90;
        var ang = Math.PI - (score/100)*Math.PI;
        var ex=(cx+r*Math.cos(ang)).toFixed(1), ey=(cy-r*Math.sin(ang)).toFixed(1);
        var bgArc='M '+(cx-r)+','+cy+' A '+r+','+r+' 0 0,1 '+(cx+r)+','+cy;
        var fillArc= score<0.5?'': score>99.5?bgArc:'M '+(cx-r)+','+cy+' A '+r+','+r+' 0 0,1 '+ex+','+ey;
        var nlx=(cx+75*Math.cos(ang)).toFixed(1), nly=(cy-75*Math.sin(ang)).toFixed(1);
        var svg='<svg viewBox="0 0 240 120" width="220" height="110" style="overflow:visible">'+
            '<path d="'+bgArc+'" fill="none" stroke="#374151" stroke-width="20"/>'+
            (fillArc?'<path d="'+fillArc+'" fill="none" stroke="'+col+'" stroke-width="20"/>':'')+
            '<text x="18" y="118" fill="#ef4444" font-size="9" font-family="monospace">FEAR</text>'+
            '<text x="165" y="118" fill="#10b981" font-size="9" font-family="monospace">GREED</text>'+
            '<line x1="'+cx+'" y1="'+cy+'" x2="'+nlx+'" y2="'+nly+'" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>'+
            '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#e0e0e0"/>'+
            '</svg>';
        // Component cards
        var order=['volatility','trend','momentum','credit','breadth','cross_asset'];
        var cards=order.map(function(k){
            var c=fg.components[k]; if(!c) return '';
            var w=Math.round((fg.weights[k]||0)*100);
            var s=c.score;
            var cc=s<=30?'#ef4444':s<=50?'#f97316':s<=70?'#eab308':'#22c55e';
            return '<div class="fg-card">'+
                '<div class="fg-card-lbl">'+c.label+' <span style="color:#4b5563">('+w+'%)</span></div>'+
                '<div class="fg-card-score" style="color:'+cc+'">'+s.toFixed(0)+'<span style="font-size:0.68rem;font-weight:400;color:#6b7280">/100</span></div>'+
                '<div class="fg-card-det">'+c.detail+'</div>'+
                '<div class="fg-bar-bg"><div class="fg-bar-fill" style="width:'+s+'%;background:'+cc+'"></div></div>'+
                '</div>';
        }).join('');
        el.innerHTML='<div class="fg-gauge-wrap">'+svg+
            '<div class="fg-score-num" style="color:'+col+'">'+score.toFixed(0)+'</div>'+
            '<div class="fg-sentiment">'+sentiment+'</div></div>'+
            '<div class="fg-grid">'+cards+'</div>'+
            '<div style="text-align:center;margin-top:8px;font-size:0.63rem;color:#4b5563">VIX · SPY · Sel Sectors · HYG/TLT · RSP · GLD</div>';
    }

                var end = m.end_date ? ' · ' + m.end_date : '';
                var deltaStr = '';

                    '<div style="white-space:nowrap;text-align:right">' +

        h += '<span style="color:#2d6080;font-weight:700;font-size:0.62rem;letter-spacing:0.06em">S/R</span>';
        srData.resistance.forEach(function(lvl) {
            var scored = lvl.score >= 5 ? ' ★' : '';
            h += '<span style="color:#f59e0b" title="Resistance · touched ' + lvl.score + 'x">R&nbsp;<b>$' + lvl.price + '</b>&nbsp;<span style="color:#3d7090">(+' + lvl.dist_pct + '%' + scored + ')</span></span>';
        });
        h += '<span style="color:#0d2035">│</span>';
        srData.support.forEach(function(lvl) {
            var scored = lvl.score >= 5 ? ' ★' : '';
            h += '<span style="color:#38bdf8" title="Support · touched ' + lvl.score + 'x">S&nbsp;<b>$' + lvl.price + '</b>&nbsp;<span style="color:#3d7090">(' + lvl.dist_pct + '%' + scored + ')</span></span>';
        });
        h += '</div>';
        el.innerHTML = h;
    }

    window.updateChart = function(symbol, element) {
        if (multiChartMode) { openSingleChart(); updateGroupChartButtons(null); }
        allTickerRows.forEach(function(row) { row.classList.remove('active'); });
        if (element) {
            element.classList.add('active');
            currentIndex = allTickerRows.indexOf(element);
        } else {
            var row = [].slice.call(document.querySelectorAll('.ticker-row')).filter(function(r) { return r.getAttribute('data-symbol') === symbol; })[0];
            if (row) { row.classList.add('active'); currentIndex = allTickerRows.indexOf(row); }
        }
        initChart(symbol);
        renderSRStrip(symbol);
        var activeRow = document.querySelector('.ticker-row.active');
        if (activeRow) activeRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };

    window.scrollToGroup = function(groupName) {
        var el = document.getElementById('group-' + safeGroupId(groupName));
        if (el) el.scrollIntoView({ behavior: 'smooth' });
    };

    window.sortGroup = function(group, sortBy) {
        var tables = document.querySelectorAll('.ticker-table');
        var table = null;
        for (var t = 0; t < tables.length; t++) {
            if (tables[t].getAttribute('data-group') === group) { table = tables[t]; break; }
        }
        if (!table) return;
        var tbody = table.querySelector('tbody');
        var rows = [].slice.call(tbody.querySelectorAll('.ticker-row'));
        var state = currentSortStates[group] || { sortBy: null, direction: 1, count: 0 };
        currentSortStates[group] = state;

        table.querySelectorAll('th, td').forEach(function(el) { el.classList.remove('sort-asc', 'sort-desc', 'sorted-column'); });

        if (state.sortBy === sortBy) {
            state.count++;
            if (state.count >= 3) {
                state.sortBy = null; state.direction = 1; state.count = 0;
                rows.sort(function(a, b) { return parseInt(a.getAttribute('data-index')) - parseInt(b.getAttribute('data-index')); });
                tbody.innerHTML = ''; rows.forEach(function(r) { tbody.appendChild(r); });
                updateAllTickerRows(); return;
            }
        } else state.count = 1;
        state.sortBy = sortBy;
        if (state.count === 2) state.direction *= -1; else state.direction = 1;

        /* Ticker,Grade,Daily,Intra,WTD,5D,20D,YTD,Vol%,VolChart,ATR%,ATRx,1M-VARS,VARS,LETF */
        var colMap = { symbol: 0, abc: 1, daily: 2, intra: 3, wtd: 4, '5d': 5, '20d': 6, ytd: 7, vol_ratio: 8,
            atr_pct: 10, dist_sma50_atr: 11, rs: 12, letf: 14 };
        var hi = colMap[sortBy];
        if (hi === undefined) hi = 9;
        var headerIndices = (sortBy === 'rs') ? [12, 13] : [hi];
        headerIndices.forEach(function(idx) {
            var h = table.querySelectorAll('th')[idx];
            if (h) h.classList.add(state.direction === 1 ? 'sort-asc' : 'sort-desc', 'sorted-column');
        });
        rows.forEach(function(row) {
            var cells = row.querySelectorAll('td');
            headerIndices.forEach(function(idx) { if (cells[idx]) cells[idx].classList.add('sorted-column'); });
        });

        var tickerToSector = (meta && meta.TICKER_TO_SECTOR) ? meta.TICKER_TO_SECTOR : {};
        var sectorOrder = (meta && meta.SECTOR_ORDER) ? meta.SECTOR_ORDER : [];
        function sectorIndex(s) { var i = sectorOrder.indexOf(s); return i >= 0 ? i : sectorOrder.length; }

        rows.sort(function(a, b) {
            var aVal, bVal;
            if (sortBy === 'symbol') {
                if (group === 'Industries') {
                    var aT = a.getAttribute('data-symbol'), bT = b.getAttribute('data-symbol');
                    var aS = tickerToSector[aT] || 'Unknown', bS = tickerToSector[bT] || 'Unknown';
                    if (sectorIndex(aS) !== sectorIndex(bS)) return (sectorIndex(aS) - sectorIndex(bS)) * state.direction;
                    return (aT.toLowerCase().localeCompare(bT.toLowerCase())) * state.direction;
                }
                return (a.getAttribute('data-symbol').toLowerCase().localeCompare(b.getAttribute('data-symbol').toLowerCase())) * state.direction;
            } else if (sortBy === 'abc') {
                return ((a.getAttribute('data-abc') || '').localeCompare(b.getAttribute('data-abc') || '')) * state.direction;
            } else if (sortBy === 'letf') {
                return (parseInt(a.getAttribute('data-letf') || '0') - parseInt(b.getAttribute('data-letf') || '0')) * state.direction;
            } else {
                var ak = 'data-' + sortBy, av = parseFloat(a.getAttribute(ak) || '0'), bv = parseFloat(b.getAttribute(ak) || '0');
                if (sortBy === 'vol_chart') return 0;
                return (av - bv) * state.direction;
            }
        });
        tbody.innerHTML = ''; rows.forEach(function(r) { tbody.appendChild(r); });
        updateAllTickerRows();
        var ar = document.querySelector('.ticker-row.active');
        if (ar) currentIndex = allTickerRows.indexOf(ar);
    };

    function updateAllTickerRows() {
        allTickerRows = [];
        document.querySelectorAll('.ticker-table').forEach(function(table) {
            [].slice.call(table.querySelectorAll('.ticker-row')).forEach(function(row) { allTickerRows.push(row); });
        });
    }

    function initApp() {
        allTickerRows = [].slice.call(document.querySelectorAll('.ticker-row'));
        document.querySelectorAll('.ticker-table').forEach(function(table) {
            var g = table.getAttribute('data-group');
            currentSortStates[g] = { sortBy: null, direction: 1, count: 0 };
        });
        var listEl = document.querySelector('.ticker-list');
        if (listEl && !listEl._sortDelegate) {
            listEl._sortDelegate = true;
            listEl.addEventListener('click', function(ev) {
                var th = ev.target.closest('th.sortable');
                if (!th) return;
                var table = th.closest('table.ticker-table');
                if (!table) return;
                var group = table.getAttribute('data-group');
                var sortBy = th.getAttribute('data-sort-by');
                if (group && sortBy) window.sortGroup(group, sortBy);
            });
        }
        defaultSymbol = (meta && meta.default_symbol) ? meta.default_symbol : 'QQQE';
        initChart(defaultSymbol);
        if (allTickerRows.length > 0) allTickerRows[0].classList.add('active');
    }
    document.addEventListener('keydown', function(e) {
        var holdOv = document.getElementById('holdings-modal-overlay');
        if (holdOv && holdOv.style.display === 'block' && holdingsList.length) {
            if (e.key === 'ArrowDown') { e.preventDefault(); holdingsIndex = Math.min(holdingsIndex + 1, holdingsList.length - 1); updateHoldingsHighlight(); return; }
            if (e.key === 'ArrowUp') { e.preventDefault(); holdingsIndex = Math.max(holdingsIndex - 1, 0); updateHoldingsHighlight(); return; }
            if (e.key === 'Enter' && holdingsIndex >= 0) { e.preventDefault(); selectHoldingSymbol(holdingsList[holdingsIndex].symbol, holdingsIndex); return; }
            if (e.key === 'Escape') { closeHoldings(e); return; }
        }
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
        if (e.key === 'ArrowDown' && allTickerRows.length) { e.preventDefault(); if (currentIndex < allTickerRows.length - 1) { currentIndex++; updateChart(allTickerRows[currentIndex].getAttribute('data-symbol'), allTickerRows[currentIndex]); } }
        if (e.key === 'ArrowUp' && allTickerRows.length) { e.preventDefault(); if (currentIndex > 0) { currentIndex--; updateChart(allTickerRows[currentIndex].getAttribute('data-symbol'), allTickerRows[currentIndex]); } }
        if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey) {
            var row = document.querySelector('.ticker-row.active');
            if (row) showHoldings(row.getAttribute('data-symbol'));
        }
    });

    function loadData() {
        Promise.all([
            fetch('data/snapshot.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; }),
            fetch('data/events.json').then(function(res) { return res.ok ? res.json() : []; }).catch(function() { return []; }),
            fetch('data/meta.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; }),
            fetch('data/polymarket.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; })
        ]).then(function(results) {
            snapshot = results[0];
            polyData = results[3];
            var events = results[1];
            meta = results[2];
            renderEvents(events);
            renderGroups();
        }).catch(function() {
            document.getElementById('groups-container').innerHTML = '<div class="loading-msg">LOADING DATA... (Run scripts/build_data.py or wait for GitHub Actions)</div>';
        });
    }

    loadData();
})();
    </script>
</body>
