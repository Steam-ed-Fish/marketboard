    function toTVSymbol(sym) {
        // Convert Yahoo Finance ticker format to TradingView exchange:symbol format
        var _overrides = {
            '^VIX': 'CBOE:VIX', '^VXN': 'CBOE:VXN', '^RVX': 'CBOE:RVX', '^VVIX': 'CBOE:VVIX',
            '^MOVE': 'TVC:MOVE', '^OVX': 'CBOE:OVX', '^GVZ': 'CBOE:GVZ',
        };
        if (_overrides[sym]) return _overrides[sym];
        if (sym.endsWith('.KS')) return 'KRX:' + sym.slice(0, -3);
        if (sym.endsWith('.KQ')) return 'KOSDAQ:' + sym.slice(0, -3);
        if (sym.endsWith('.T'))  return 'TSE:' + sym.slice(0, -2);
        if (sym.endsWith('.HK')) return 'HKEX:' + sym.slice(0, -3);
        if (sym.endsWith('.SS')) return 'SSE:' + sym.slice(0, -3);
        if (sym.endsWith('.SZ')) return 'SZSE:' + sym.slice(0, -3);
        return sym;
    }

    var ohlcCache = {};

    function computeSMA(bars, period) {
        var result = [];
        for (var i = period - 1; i < bars.length; i++) {
            var sum = 0;
            for (var j = i - period + 1; j <= i; j++) sum += bars[j].c;
            result.push({ time: bars[i].t, value: sum / period });
        }
        return result;
    }

    function buildMainChart(container, data, symbol) {
        // Info bar overlay
        var last = data.ohlc[data.ohlc.length - 1];
        var prev = data.ohlc.length > 1 ? data.ohlc[data.ohlc.length - 2] : last;
        var chg = last.c - prev.c;
        var chgPct = prev.c ? ((chg / prev.c) * 100) : 0;
        var chgColor = chg >= 0 ? '#26a69a' : '#ef5350';
        var info = document.createElement('div');
        info.style.cssText = 'position:absolute;top:8px;left:12px;z-index:3;pointer-events:none;font-family:monospace';
        var tickerName = data.name || '';
        info.innerHTML = '<span style="font-size:16px;font-weight:700;color:#e1e4e8">' + symbol + '</span>' +
            (tickerName ? '<span style="font-size:13px;color:#9ca3af;margin-left:8px">' + tickerName + '</span>' : '') +
            '<br><span style="font-size:14px;font-weight:600;color:' + chgColor + '">' +
            last.c.toFixed(2) + '</span>' +
            '<span style="font-size:12px;color:' + chgColor + ';margin-left:6px">' +
            (chg >= 0 ? '+' : '') + chg.toFixed(2) + ' (' + (chgPct >= 0 ? '+' : '') + chgPct.toFixed(2) + '%)</span>' +
            '<span style="font-size:11px;color:#6b7280;margin-left:8px">O ' + last.o.toFixed(2) +
            '  H ' + last.h.toFixed(2) + '  L ' + last.l.toFixed(2) + '  C ' + last.c.toFixed(2) + '</span>';
        container.style.position = 'relative';
        container.appendChild(info);

        var chart = LightweightCharts.createChart(container, {
            layout: { background: { type: 'solid', color: '#1a1a1a' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.06)' }, horzLines: { color: 'rgba(255,255,255,0.06)' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2B2B43', scaleMargins: { top: 0.08, bottom: 0.18 } },
            timeScale: { borderColor: '#2B2B43', timeVisible: false },
            width: container.clientWidth,
            height: container.clientHeight,
        });

        var candles = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350',
            borderUpColor: '#26a69a', borderDownColor: '#ef5350',
            wickUpColor: '#26a69a', wickDownColor: '#ef5350',
        });
        candles.setData(data.ohlc.map(function(d) {
            return { time: d.t, open: d.o, high: d.h, low: d.l, close: d.c };
        }));

        var vol = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol' });
        vol.priceScale().applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });
        vol.setData(data.ohlc.map(function(d) {
            return { time: d.t, value: d.v,
                color: d.c >= d.o ? 'rgba(38,166,154,0.4)' : 'rgba(239,83,80,0.4)' };
        }));

        var maConfigs = [{ period: 20, color: '#2196F3' }, { period: 50, color: '#FF9800' }, { period: 200, color: '#E91E63' }];
        maConfigs.forEach(function(ma) {
            var line = chart.addLineSeries({
                color: ma.color, lineWidth: 1,
                priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
            });
            line.setData(computeSMA(data.ohlc, ma.period));
        });

        // S/R lines from snapshot
        var srData = null;
        if (snapshot && snapshot.groups) {
            Object.values(snapshot.groups).forEach(function(rows) {
                rows.forEach(function(r) { if (r.ticker === symbol && r.sr) srData = r.sr; });
            });
        }
        if (srData) {
            (srData.resistance || []).forEach(function(lvl) {
                candles.createPriceLine({ price: lvl.price, color: '#f59e0b', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true,
                    title: 'R ' + (lvl.dist_pct > 0 ? '+' : '') + lvl.dist_pct + '%' });
            });
            (srData.support || []).forEach(function(lvl) {
                candles.createPriceLine({ price: lvl.price, color: '#38bdf8', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true,
                    title: 'S ' + lvl.dist_pct + '%' });
            });
        }

        // Previous Day / Previous Week High-Low (ZCT-style tactical levels)
        var ohlc = data.ohlc;
        if (ohlc.length >= 2) {
            var prevDay = ohlc[ohlc.length - 2]; // second-to-last bar = previous completed day
            candles.createPriceLine({ price: prevDay.h, color: 'rgba(163,230,53,0.10)', lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false,
                title: '' });
            candles.createPriceLine({ price: prevDay.l, color: 'rgba(163,230,53,0.10)', lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false,
                title: '' });
        }
        if (ohlc.length >= 6) {
            // Previous week = 5 trading days before the last bar
            var pwSlice = ohlc.slice(-6, -1); // 5 bars ending before the current day
            var pwHigh = -Infinity, pwLow = Infinity;
            pwSlice.forEach(function(d) { if (d.h > pwHigh) pwHigh = d.h; if (d.l < pwLow) pwLow = d.l; });
            candles.createPriceLine({ price: pwHigh, color: 'rgba(20,184,166,0.15)', lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false,
                title: '' });
            candles.createPriceLine({ price: pwLow, color: 'rgba(20,184,166,0.15)', lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false,
                title: '' });
        }

        // Trendlines (diagonal) from snapshot
        var _tlData = null;
        if (snapshot && snapshot.groups) {
            Object.values(snapshot.groups).forEach(function(rows) {
                rows.forEach(function(r) { if (r.ticker === symbol && r.trendlines) _tlData = r.trendlines; });
            });
        }
        if (_tlData) {
            if (_tlData.support) {
                var _slLine = chart.addLineSeries({
                    color: 'rgba(34,211,238,0.20)', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dotted,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false
                });
                _slLine.setData([
                    { time: _tlData.support.t1, value: _tlData.support.p1 },
                    { time: _tlData.support.t2, value: _tlData.support.p2 }
                ]);
            }
            if (_tlData.resistance) {
                var _rlLine = chart.addLineSeries({
                    color: 'rgba(251,146,60,0.20)', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dotted,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false
                });
                _rlLine.setData([
                    { time: _tlData.resistance.t1, value: _tlData.resistance.p1 },
                    { time: _tlData.resistance.t2, value: _tlData.resistance.p2 }
                ]);
            }
        }

        // Consolidation box (horizontal lines at box high/low)
        var _consData = null;
        if (snapshot && snapshot.groups) {
            Object.values(snapshot.groups).forEach(function(rows) {
                rows.forEach(function(r) { if (r.ticker === symbol && r.consolidation) _consData = r.consolidation; });
            });
        }
        if (_consData) {
            candles.createPriceLine({ price: _consData.high, color: 'rgba(255,255,255,0.12)', lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false, title: '' });
            candles.createPriceLine({ price: _consData.low, color: 'rgba(255,255,255,0.12)', lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false, title: '' });
        }

        // Options levels overlay (SPY, QQQ, IWM, DIA)
        var optsData = snapshot && snapshot.options_intel && snapshot.options_intel[symbol];
        if (optsData) {
            if (optsData.max_pain) {
                candles.createPriceLine({ price: optsData.max_pain.strike, color: '#d946ef', lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true,
                    title: 'MaxPain $' + optsData.max_pain.strike });
            }
            if (optsData.gex && optsData.gex.gamma_flip != null) {
                candles.createPriceLine({ price: optsData.gex.gamma_flip, color: '#f43f5e', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: true,
                    title: 'GEX Flip' });
            }
            if (optsData.atm_iv != null) {
                // Use current close from OHLC (not stale spot) for expected move
                var _lastClose = data.ohlc.length ? data.ohlc[data.ohlc.length - 1].c : optsData.spot;
                var dailySigma = optsData.atm_iv / 100 / Math.sqrt(252);
                var emUp = _lastClose * (1 + dailySigma);
                var emDn = _lastClose * (1 - dailySigma);
                var emPct = (dailySigma * 100).toFixed(1);
                candles.createPriceLine({ price: emUp, color: '#6366f1', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: true,
                    title: '+' + emPct + '%' });
                candles.createPriceLine({ price: emDn, color: '#6366f1', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: true,
                    title: '-' + emPct + '%' });
            }
        }

        chart.timeScale().fitContent();
        return chart;
    }

    window.initChart = function initChart(symbol) {
        var rrgPanel = document.getElementById('rrg-chart-panel');
        var tvWrapper = document.getElementById('tradingview-chart-wrapper');
        var volPanel = document.getElementById('vol-chart-panel');
        if (rrgPanel) rrgPanel.style.display = 'none';
        if (volPanel) volPanel.style.display = 'none';
        if (tvWrapper) tvWrapper.style.display = 'flex';

        var container = document.getElementById('tradingview-chart');
        if (chartWidget) { try { chartWidget.remove(); } catch(e) {} chartWidget = null; }
        container.innerHTML = '';

        var safe = symbol.replace(/[^a-zA-Z0-9]/g, '_');
        function doRender(data) {
            container.innerHTML = '';
            if (!data || !data.ohlc || !data.ohlc.length) {
                container.innerHTML = '<div style="color:#9ca3af;padding:40px;text-align:center">No data for ' + symbol + '</div>';
                return;
            }
            chartWidget = buildMainChart(container, data, symbol);
            if (window._lwcResizeObserver) window._lwcResizeObserver.disconnect();
            window._lwcResizeObserver = new ResizeObserver(function() {
                if (chartWidget) chartWidget.applyOptions({ width: container.clientWidth, height: container.clientHeight });
            });
            window._lwcResizeObserver.observe(container);
        }

        if (ohlcCache[safe]) {
            doRender(ohlcCache[safe]);
        } else {
            container.innerHTML = '<div style="color:#9ca3af;padding:40px;text-align:center">Loading...</div>';
            fetch('data/ohlc/' + safe + '.json')
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(data) { if (data) ohlcCache[safe] = data; doRender(data); })
                .catch(function() { doRender(null); });
        }
    }

    var miniChartInstance = null;

    function renderMiniChart(symbol) {
        var el = document.getElementById('mini-chart');
        if (!el || typeof LightweightCharts === 'undefined') return;
        var srData = null;
        if (snapshot && snapshot.groups) {
            Object.values(snapshot.groups).forEach(function(rows) {
                rows.forEach(function(r) { if (r.ticker === symbol && r.sr) srData = r.sr; });
            });
        }
        if (miniChartInstance) { try { miniChartInstance.remove(); } catch(e) {} miniChartInstance = null; }
        el.innerHTML = '';

        function buildChart(data) {
            if (!data || !data.ohlc || !data.ohlc.length) { el.style.display = 'none'; return; }
            el.style.display = 'block';
            var chart = LightweightCharts.createChart(el, {
                autoSize: true,
                layout: { background: { color: '#040c1a' }, textColor: '#4a7090' },
                grid: { vertLines: { color: '#080e1a' }, horzLines: { color: '#080e1a' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#0a1e35', scaleMargins: { top: 0.08, bottom: 0.22 } },
                timeScale: { borderColor: '#0a1e35', timeVisible: false },
                watermark: { visible: true, fontSize: 10, horzAlign: 'left', vertAlign: 'top',
                    color: 'rgba(56,189,248,0.25)', text: '60D  ·  S/R ZONES' },
            });
            miniChartInstance = chart;

            var candles = chart.addCandlestickSeries({
                upColor: '#10b981', downColor: '#ef4444',
                borderUpColor: '#10b981', borderDownColor: '#ef4444',
                wickUpColor: '#10b981', wickDownColor: '#ef4444',
            });
            candles.setData(data.ohlc.map(function(d) {
                return { time: d.t, open: d.o, high: d.h, low: d.l, close: d.c };
            }));

            var vol = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol' });
            vol.priceScale().applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });
            vol.setData(data.ohlc.map(function(d) {
                return { time: d.t, value: d.v,
                    color: d.c >= d.o ? 'rgba(16,185,129,0.25)' : 'rgba(239,68,68,0.25)' };
            }));

            if (srData) {
                (srData.resistance || []).forEach(function(lvl) {
                    candles.createPriceLine({ price: lvl.price, color: '#f59e0b', lineWidth: 1,
                        lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true,
                        title: 'R ' + (lvl.dist_pct > 0 ? '+' : '') + lvl.dist_pct + '%' });
                });
                (srData.support || []).forEach(function(lvl) {
                    candles.createPriceLine({ price: lvl.price, color: '#38bdf8', lineWidth: 1,
                        lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true,
                        title: 'S ' + lvl.dist_pct + '%' });
                });
            }
            chart.timeScale().fitContent();
        }

        var safe = symbol.replace(/[^a-zA-Z0-9]/g, '_');
        if (ohlcCache[safe]) {
            buildChart(ohlcCache[safe]);
        } else {
            fetch('data/ohlc/' + safe + '.json')
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(data) { if (data) ohlcCache[safe] = data; buildChart(data); })
                .catch(function() { el.style.display = 'none'; });
        }
    }

    function renderSRStrip(symbol) {
        var el = document.getElementById('sr-strip');
        if (!el) return;
        var srData = null;
        if (snapshot && snapshot.groups) {
            Object.values(snapshot.groups).forEach(function(rows) {
                rows.forEach(function(r) { if (r.ticker === symbol && r.sr) srData = r.sr; });
            });
        }
        var hasSR = srData && (srData.support.length || srData.resistance.length);
        var safe = symbol.replace(/[^a-zA-Z0-9]/g, '_');
        var ohlc = ohlcCache[safe] && ohlcCache[safe].ohlc;
        var hasOHLC = ohlc && ohlc.length >= 2;
        if (!hasSR && !hasOHLC) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        var h = '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
        if (hasSR) {
            h += '<span style="color:#2d6080;font-weight:700;font-size:0.62rem;letter-spacing:0.06em">S/R</span>';
            srData.resistance.forEach(function(lvl) {
                var scored = lvl.score >= 5 ? ' ★' : '';
                h += '<span style="color:#f59e0b" title="Resistance · touched ' + lvl.score + 'x">R&nbsp;<b>$' + lvl.price + '</b>&nbsp;<span style="color:#3d7090">(+' + lvl.dist_pct + '%' + scored + ')</span></span>';
            });
            h += '<span style="color:#0d2035">│</span>';
            srData.support.forEach(function(lvl) {
                var scored = lvl.score >= 5 ? ' ★' : '';
                h += '<span style="color:#38bdf8" title="Support · touched ' + lvl.score + 'x">S&nbsp;<b>$' + lvl.price + '</b>&nbsp;<span style="color:#3d7090">(' + lvl.dist_pct + '%' + scored + ')</span></span>';
            });
        }
        // Append PDH/PDL/PWH/PWL from OHLC cache
        if (ohlc && ohlc.length >= 2) {
            var pd = ohlc[ohlc.length - 2];
            var lastC = ohlc[ohlc.length - 1].c;
            var pdhPct = ((pd.h - lastC) / lastC * 100).toFixed(1);
            var pdlPct = ((pd.l - lastC) / lastC * 100).toFixed(1);
            h += '<span style="color:#0d2035">│</span>';
            h += '<span style="color:#a3e635" title="Previous Day High">PDH&nbsp;<b>$' + pd.h.toFixed(2) + '</b>&nbsp;<span style="color:#3d7090">(' + (pdhPct > 0 ? '+' : '') + pdhPct + '%)</span></span>';
            h += '<span style="color:#a3e635" title="Previous Day Low">PDL&nbsp;<b>$' + pd.l.toFixed(2) + '</b>&nbsp;<span style="color:#3d7090">(' + (pdlPct > 0 ? '+' : '') + pdlPct + '%)</span></span>';
        }
        if (ohlc && ohlc.length >= 6) {
            var pw = ohlc.slice(-6, -1);
            var pwH = -Infinity, pwL = Infinity;
            pw.forEach(function(d) { if (d.h > pwH) pwH = d.h; if (d.l < pwL) pwL = d.l; });
            var lastC2 = ohlc[ohlc.length - 1].c;
            var pwhPct = ((pwH - lastC2) / lastC2 * 100).toFixed(1);
            var pwlPct = ((pwL - lastC2) / lastC2 * 100).toFixed(1);
            h += '<span style="color:#0d2035">│</span>';
            h += '<span style="color:#14b8a6" title="Previous Week High (5d)">PWH&nbsp;<b>$' + pwH.toFixed(2) + '</b>&nbsp;<span style="color:#3d7090">(' + (pwhPct > 0 ? '+' : '') + pwhPct + '%)</span></span>';
            h += '<span style="color:#14b8a6" title="Previous Week Low (5d)">PWL&nbsp;<b>$' + pwL.toFixed(2) + '</b>&nbsp;<span style="color:#3d7090">(' + (pwlPct > 0 ? '+' : '') + pwlPct + '%)</span></span>';
        }

        h += '</div>';
        el.innerHTML = h;
    }

    function renderOptsStrip(symbol) {
        var el = document.getElementById('opts-strip');
        if (!el) return;
        var d = snapshot && snapshot.options_intel && snapshot.options_intel[symbol];
        if (!d) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        var h = '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
        h += '<span style="color:#2d6080;font-weight:700;font-size:0.62rem;letter-spacing:0.06em">OPTIONS</span>';

        // IV
        if (d.atm_iv != null) {
            var ivC = d.atm_iv > 40 ? '#ef4444' : d.atm_iv > 30 ? '#f97316' : d.atm_iv > 20 ? '#eab308' : '#10b981';
            h += '<span style="color:' + ivC + '">IV <b>' + d.atm_iv.toFixed(1) + '%</b></span>';
        }

        // PCR
        var pcr = d.pcr || {};
        var pcrVal = pcr.oi != null ? pcr.oi : pcr.vol;
        if (pcrVal != null) {
            var pcrC = pcrVal > 1.2 ? '#ef4444' : pcrVal < 0.8 ? '#10b981' : '#eab308';
            var pcrL = pcr.oi != null ? 'OI' : 'Vol';
            h += '<span style="color:#0d2035">\u2502</span>';
            h += '<span style="color:' + pcrC + '">PCR(' + pcrL + ') <b>' + pcrVal.toFixed(2) + '</b></span>';
        }

        // GEX
        if (d.gex) {
            var gexC = d.gex.net_gex >= 0 ? '#10b981' : '#ef4444';
            var gexTag = d.gex.net_gex >= 0 ? 'Pin' : 'Vol';
            h += '<span style="color:#0d2035">\u2502</span>';
            h += '<span style="color:' + gexC + '">GEX <b>' + (d.gex.net_gex >= 0 ? '+' : '') + d.gex.net_gex.toFixed(1) + '</b> ' + gexTag + '</span>';
        }

        // Skew
        if (d.iv_skew) {
            var skC = d.iv_skew.skew > 6 ? '#ef4444' : d.iv_skew.skew > 3 ? '#eab308' : '#10b981';
            h += '<span style="color:#0d2035">\u2502</span>';
            h += '<span style="color:' + skC + '">Skew <b>' + (d.iv_skew.skew >= 0 ? '+' : '') + d.iv_skew.skew.toFixed(1) + '</b></span>';
        }

        // Max Pain
        if (d.max_pain) {
            var mpC = d.max_pain.dist_pct >= 0 ? '#10b981' : '#ef4444';
            h += '<span style="color:#0d2035">\u2502</span>';
            h += '<span style="color:#d946ef">MaxPain <b>$' + d.max_pain.strike.toFixed(0) + '</b> <span style="color:' + mpC + '">(' + (d.max_pain.dist_pct >= 0 ? '+' : '') + d.max_pain.dist_pct.toFixed(1) + '%)</span></span>';
        }

        // Gamma Flip
        if (d.gex && d.gex.gamma_flip != null) {
            var flipC = d.gex.gamma_flip_dist_pct >= 0 ? '#10b981' : '#ef4444';
            h += '<span style="color:#0d2035">\u2502</span>';
            h += '<span style="color:#f43f5e">Flip <b>$' + d.gex.gamma_flip.toFixed(0) + '</b> <span style="color:' + flipC + '">(' + (d.gex.gamma_flip_dist_pct >= 0 ? '+' : '') + d.gex.gamma_flip_dist_pct.toFixed(1) + '%)</span></span>';
        }

        h += '</div>';
        el.innerHTML = h;
    }

    window.updateChart = function(symbol, element) {
        if (multiChartMode) { openSingleChart(); updateGroupChartButtons(null); }
        allTickerRows.forEach(function(row) { row.classList.remove('active'); });
        if (element) {
            element.classList.add('active');
            currentIndex = allTickerRows.indexOf(element);
        } else {
            var row = [].slice.call(document.querySelectorAll('.ticker-row')).filter(function(r) { return r.getAttribute('data-symbol') === symbol; })[0];
            if (row) { row.classList.add('active'); currentIndex = allTickerRows.indexOf(row); }
        }
        initChart(symbol);
        renderSRStrip(symbol);
        renderOptsStrip(symbol);
        var activeRow = document.querySelector('.ticker-row.active');
        if (activeRow) activeRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };

    window.scrollToGroup = function(groupName) {
        var el = document.getElementById('group-' + safeGroupId(groupName));
        if (el) el.scrollIntoView({ behavior: 'smooth' });
    };

    window.sortGroup = function(group, sortBy) {
        var tables = document.querySelectorAll('.ticker-table');
        var table = null;
        for (var t = 0; t < tables.length; t++) {
            if (tables[t].getAttribute('data-group') === group) { table = tables[t]; break; }
        }
        if (!table) return;
        var tbody = table.querySelector('tbody');
        var rows = [].slice.call(tbody.querySelectorAll('.ticker-row'));
        var state = currentSortStates[group] || { sortBy: null, direction: 1, count: 0 };
        currentSortStates[group] = state;

        table.querySelectorAll('th, td').forEach(function(el) { el.classList.remove('sort-asc', 'sort-desc', 'sorted-column'); });

        if (state.sortBy === sortBy) {
            state.count++;
            if (state.count >= 3) {
                state.sortBy = null; state.direction = 1; state.count = 0;
                rows.sort(function(a, b) { return parseInt(a.getAttribute('data-index')) - parseInt(b.getAttribute('data-index')); });
                tbody.innerHTML = ''; rows.forEach(function(r) { tbody.appendChild(r); });
                updateAllTickerRows(); return;
            }
        } else state.count = 1;
        state.sortBy = sortBy;
        if (state.count === 2) state.direction *= -1; else state.direction = 1;

        /* Ticker(0),S/R(1),Holdings(2),Grade(3),Daily(4),Intra(5),WTD(6),5D(7),20D(8),YTD(9),Vol%(10),VolChart(11),ATR%(12),EM%(13),Beat?(14),ATRx(15),RS(16),VARS(17) */
        var colMap = { symbol: 0, abc: 3, daily: 4, intra: 5, wtd: 6, '5d': 7, '20d': 8, ytd: 9, vol_ratio: 10,
            atr_pct: 12, em_pct: 13, em_beat: 14, dist_sma50_atr: 15, rs: 16 };
        var hi = colMap[sortBy];
        if (hi === undefined) hi = 10;
        var headerIndices = (sortBy === 'rs') ? [16, 17] : [hi];
        headerIndices.forEach(function(idx) {
            var h = table.querySelectorAll('th')[idx];
            if (h) h.classList.add(state.direction === 1 ? 'sort-asc' : 'sort-desc', 'sorted-column');
        });
        rows.forEach(function(row) {
            var cells = row.querySelectorAll('td');
            headerIndices.forEach(function(idx) { if (cells[idx]) cells[idx].classList.add('sorted-column'); });
        });

        var tickerToSector = (meta && meta.TICKER_TO_SECTOR) ? meta.TICKER_TO_SECTOR : {};
        var sectorOrder = (meta && meta.SECTOR_ORDER) ? meta.SECTOR_ORDER : [];
        function sectorIndex(s) { var i = sectorOrder.indexOf(s); return i >= 0 ? i : sectorOrder.length; }

        rows.sort(function(a, b) {
            var aVal, bVal;
            if (sortBy === 'symbol') {
                if (group === 'Industries') {
                    var aT = a.getAttribute('data-symbol'), bT = b.getAttribute('data-symbol');
                    var aS = tickerToSector[aT] || 'Unknown', bS = tickerToSector[bT] || 'Unknown';
                    if (sectorIndex(aS) !== sectorIndex(bS)) return (sectorIndex(aS) - sectorIndex(bS)) * state.direction;
                    return (aT.toLowerCase().localeCompare(bT.toLowerCase())) * state.direction;
                }
                return (a.getAttribute('data-symbol').toLowerCase().localeCompare(b.getAttribute('data-symbol').toLowerCase())) * state.direction;
            } else if (sortBy === 'abc') {
                return ((a.getAttribute('data-abc') || '').localeCompare(b.getAttribute('data-abc') || '')) * state.direction;
            } else {
                var ak = 'data-' + sortBy, av = parseFloat(a.getAttribute(ak) || '0'), bv = parseFloat(b.getAttribute(ak) || '0');
                if (sortBy === 'vol_chart') return 0;
                return (av - bv) * state.direction;
            }
        });
        tbody.innerHTML = ''; rows.forEach(function(r) { tbody.appendChild(r); });
        updateAllTickerRows();
        var ar = document.querySelector('.ticker-row.active');
        if (ar) currentIndex = allTickerRows.indexOf(ar);
    };

    function updateAllTickerRows() {
        allTickerRows = [];
        document.querySelectorAll('.ticker-table').forEach(function(table) {
            [].slice.call(table.querySelectorAll('.ticker-row')).forEach(function(row) { allTickerRows.push(row); });
        });
    }

    function initApp() {
        allTickerRows = [].slice.call(document.querySelectorAll('.ticker-row'));
        document.querySelectorAll('.ticker-table').forEach(function(table) {
            var g = table.getAttribute('data-group');
            currentSortStates[g] = { sortBy: null, direction: 1, count: 0 };
        });
        var listEl = document.querySelector('.ticker-list');
        if (listEl && !listEl._sortDelegate) {
            listEl._sortDelegate = true;
            listEl.addEventListener('click', function(ev) {
                var th = ev.target.closest('th.sortable');
                if (!th) return;
                var table = th.closest('table.ticker-table');
                if (!table) return;
                var group = table.getAttribute('data-group');
                var sortBy = th.getAttribute('data-sort-by');
                if (group && sortBy) window.sortGroup(group, sortBy);
            });
        }
        defaultSymbol = (meta && meta.default_symbol) ? meta.default_symbol : 'QQQE';
        initChart(defaultSymbol);
        if (allTickerRows.length > 0) allTickerRows[0].classList.add('active');
    }
    document.addEventListener('keydown', function(e) {
        var holdOv = document.getElementById('holdings-modal-overlay');
        if (holdOv && holdOv.style.display === 'block' && holdingsList.length) {
            if (e.key === 'ArrowDown') { e.preventDefault(); holdingsIndex = Math.min(holdingsIndex + 1, holdingsList.length - 1); updateHoldingsHighlight(); return; }
            if (e.key === 'ArrowUp') { e.preventDefault(); holdingsIndex = Math.max(holdingsIndex - 1, 0); updateHoldingsHighlight(); return; }
            if (e.key === 'Enter' && holdingsIndex >= 0) { e.preventDefault(); selectHoldingSymbol(holdingsList[holdingsIndex].symbol, holdingsIndex); return; }
            if (e.key === 'Escape') { closeHoldings(e); return; }
        }
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
        if (e.key === 'ArrowDown' && allTickerRows.length) { e.preventDefault(); if (currentIndex < allTickerRows.length - 1) { currentIndex++; updateChart(allTickerRows[currentIndex].getAttribute('data-symbol'), allTickerRows[currentIndex]); } }
        if (e.key === 'ArrowUp' && allTickerRows.length) { e.preventDefault(); if (currentIndex > 0) { currentIndex--; updateChart(allTickerRows[currentIndex].getAttribute('data-symbol'), allTickerRows[currentIndex]); } }
        if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey) {
            var row = document.querySelector('.ticker-row.active');
            if (row) showHoldings(row.getAttribute('data-symbol'));
        }
    });

    function loadData() {
        Promise.all([
            fetch('data/snapshot.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; }),
            fetch('data/events.json').then(function(res) { return res.ok ? res.json() : []; }).catch(function() { return []; }),
            fetch('data/meta.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; }),
            fetch('data/polymarket.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; }),
            fetch('data/rotation_history.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; }),
            fetch('data/news.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; })
        ]).then(function(results) {
            snapshot = results[0];
            polyData = results[3];
            rotationData = results[4];
            newsData = results[5];
            // Build emYesterday lookup from second-to-last snapshot (all groups)
            emYesterday = {};
            if (rotationData && rotationData.snapshots && rotationData.snapshots.length >= 2) {
                var prevSnap = rotationData.snapshots[rotationData.snapshots.length - 2];
                if (prevSnap.groups) {
                    Object.keys(prevSnap.groups).forEach(function(gn) {
                        var grp = prevSnap.groups[gn];
                        Object.keys(grp).forEach(function(tk) {
                            if (grp[tk].em_pct != null && emYesterday[tk] == null) {
                                emYesterday[tk] = grp[tk].em_pct;
                            }
                        });
                    });
                }
            }
            var events = results[1];
            meta = results[2];
            renderEvents(events);
            renderNews(newsData);
            renderGroups();
        }).catch(function(err) {
            document.getElementById('groups-container').innerHTML = '<div class="loading-msg">LOADING DATA... (Run scripts/build_data.py or wait for GitHub Actions)<br><span style="font-size:0.7rem;color:#ef4444;margin-top:8px;display:block">Error: ' + (err && err.message ? err.message : String(err)) + '</span></div>';
        });
    }

    loadData();
})();
    </script>
