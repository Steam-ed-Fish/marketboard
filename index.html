<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Chart Viewer</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #060d1c; color: #d4e4f4; }
        .ticker-table th.sorted-column { background-color: #0c2e52 !important; }
        .ticker-table td.sorted-column { background-color: #071e38; }
        .ticker-list { width: 1200px; background-color: #060d1c; padding: 0; overflow-y: auto; border-right: 1px solid #0d2035; }
        .chart-container { flex: 1; display: flex; flex-direction: column; padding: 10px; background-color: #060d1c; min-height: 0; }
        .group-container { margin-bottom: 10px; border-radius: 8px; border: 1px solid #0d2035; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
        .group-header {
            background: linear-gradient(180deg, #0e2140 0%, #081828 100%);
            padding: 6px 8px; font-weight: bold; font-size: 0.9em;
            display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
            position: sticky; top: 0; z-index: 3; color: #d4e4f4;
            border-top: 1px solid rgba(56,189,248,0.22); border-bottom: 1px solid #0d2035;
            box-shadow: inset 0 1px 0 rgba(56,189,248,0.07), 0 2px 8px rgba(0,0,0,0.35);
            cursor: pointer; user-select: none;
        }
        .group-header:hover { background: linear-gradient(180deg, #122848 0%, #0a1e35 100%); }
        .group-header-title { cursor: pointer; }
        .card-left { display: flex; align-items: center; gap: 6px; }
        .card-chevron { font-size: 0.8rem; color: #2d6080; transition: transform 0.18s; display: inline-block; }
        .card-chevron.open { transform: rotate(90deg); }
        .card-summary { font-size: 0.72rem; color: #2d6080; font-weight: 400; }
        .card-body { display: none; }
        .group-header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
        .group-chart-btn {
            font-size: 11px; font-weight: 600; background-color: #060f1e; color: #7ab8d8;
            padding: 4px 8px; border: 1px solid rgba(56,189,248,0.2); border-radius: 3px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .group-chart-btn:hover { background-color: #0a1e35; border-color: rgba(56,189,248,0.45); color: #38bdf8; }
        .legend { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .legend-item { padding: 2px 6px; border-radius: 6px; font-size: 0.75em; color: white; user-select: none; }
        .ticker-table { width: 100%; border-collapse: collapse; font-size: 0.80em; }
        /* Col layout: Ticker(1) S/R(2) Holdings(3) Grade(4) Daily(5) Intra(6) WTD(7) 5D(8) 20D(9) YTD(10) Vol%(11) VolChart(12) ATR%(13) EM%(14) Beat?(15) ATRx(16) RS(17) VARS(18) Gap(19) */
        .ticker-table th, .ticker-table td { padding: 3px 4px; overflow: hidden; white-space: nowrap; }
        .ticker-table thead { position: sticky; z-index: 2; }
        .ticker-table th {
            text-align: left; padding: 4px 6px; background-color: #071628; cursor: pointer; user-select: none;
            font-weight: bold; border-bottom: 1px solid #0d2035; color: #7ab8d8;
        }
        .ticker-table th:hover { background-color: #0a1e35; color: #38bdf8; }
        .ticker-table th.sortable { cursor: pointer; }
        .ticker-table th.sortable:hover { color: #38bdf8; }
        .ticker-table th.sort-asc::after { content: " ↑"; }
        .ticker-table th.sort-desc::after { content: " ↓"; }
        .ticker-table td { padding: 3px 6px; border-bottom: 1px solid #0a1a2e; vertical-align: middle; color: #d4e4f4; }
        .ticker-row { cursor: pointer; transition: all 0.2s; }
        .ticker-row:hover { background-color: #071828; }
        .ticker-row.active { background-color: #0a2540; }
        .ticker-table td.price-up { color: #10b981 !important; font-weight: bold; }
        .ticker-table td.price-down { color: #ef4444 !important; font-weight: bold; }
        .value-visualization { position: relative; display: inline-block; padding: 2px 3px; border-radius: 3px; min-width: 38px; max-width: 100%; text-align: right; }
        .value-bar { position: absolute; top: 0; height: 100%; border-radius: 3px; opacity: 0.2; z-index: 0; max-width: 100%; }
        .value-bar.positive { background-color: #10b981; left: 0; right: auto; }
        .value-bar.negative { background-color: #ef4444; right: 0; left: auto; }
        .value-text { position: relative; z-index: 1; }
        .rs-chart { width: 100%; max-width: 100px; height: 22px; display: block; object-fit: contain; }
        .tradingview-widget-container { flex: 1; min-height: 0; }
        .key-hint { font-size: 11px; color: #2d6080; margin-top: 15px; padding: 5px; background: linear-gradient(180deg, #0e2140 0%, #081828 100%); border-radius: 3px; position: sticky; bottom: 0; border: 1px solid rgba(56,189,248,0.15); }
        .long-etf { color: #4ade80; cursor: pointer; text-decoration: underline; }
        .short-etf { color: #f87171; cursor: pointer; text-decoration: underline; }
        .etf-list { white-space: nowrap; font-size: 0.8em; }
        .etf-list span:hover { font-weight: bold; }
        .ticker-label { display: inline-block; padding: 2px 7px; border-radius: 12px; background-color: #0e2540; color: #d4e4f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; vertical-align: middle; }
        .holdings-btn {
            font-size: 10px; font-weight: 600; background-color: #060f1e; color: #3d7090;
            width: 18px; height: 18px; padding: 0; border: 1px solid #1a3550; border-radius: 50%;
            cursor: pointer; margin-left: 4px; flex-shrink: 0;
        }
        .holdings-btn:hover { background-color: #0a1e35; color: #38bdf8; }
        .hcol-btn {
            font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px;
            border: none; cursor: pointer; color: #fff; letter-spacing: 0.02em; display: block; width: 100%;
        }
        .hcol-btn-up   { background-color: #065f46; }
        .hcol-btn-up:hover { background-color: #10b981; }
        .hcol-btn-down { background-color: #7f1d1d; }
        .hcol-btn-down:hover { background-color: #ef4444; }
        .hcol-btn-flat { background-color: #0e2540; }
        .hcol-btn-flat:hover { background-color: #1a3550; }
        .abc-rating { display: inline-block; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; font-weight: bold; color: white; }
        .abc-a { background-color: #0ea5e9; }
        .abc-b { background-color: #10b981; }
        .abc-c { background-color: #f59e0b; }
        .stage-tag { display:inline-block; font-size:0.6rem; font-weight:700; margin-left:2px; width:14px; height:14px; line-height:14px; text-align:center; border-radius:3px; vertical-align:middle; }
        .stage-1 { background:#4b5563; color:#d1d5db; }
        .stage-2 { background:#059669; color:#fff; }
        .stage-3 { background:#d97706; color:#fff; }
        .stage-4 { background:#dc2626; color:#fff; }
        .economic-events { margin-bottom: 10px; }
        .events-button {
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            background: linear-gradient(180deg, #0e2140 0%, #081828 100%);
            color: #7ab8d8;
            padding: 8px 12px;
            border: 1px solid rgba(56,189,248,0.2);
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .events-button:hover { background: linear-gradient(180deg, #122848 0%, #0a1e35 100%); border-color: rgba(56,189,248,0.45); color: #38bdf8; }
        .events-tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: #3d7090; cursor: pointer; padding: 4px 12px; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.03em; }
        .events-tab.active { color: #d4e4f4; border-bottom-color: #38bdf8; }
        .events-tab:hover { color: #d4e4f4; }
        .event-item {
            padding: 10px 12px; border-bottom: 1px solid #0a1e35; background-color: #060d1c;
            font-family: Arial, sans-serif; font-size: 0.8em; line-height: 1.5;
        }
        .event-item:hover { background-color: #071e38; }
        .event-item:last-child { border-bottom: none; }
        .event-item .event-datetime { font-weight: bold; color: #38bdf8; }
        .event-item .event-name { color: #a8c8e0; }
        /* Daily Briefing card */
        .briefing-card { border: 1px solid rgba(56,189,248,0.25); border-radius: 6px; margin: 8px; overflow: hidden; background: linear-gradient(180deg, #071828 0%, #050e1a 100%); }
        .briefing-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: linear-gradient(90deg, #0a2545 0%, #071828 100%); border-bottom: 1px solid rgba(56,189,248,0.15); cursor: pointer; }
        .briefing-label { font-size: 0.72rem; font-weight: 700; color: #38bdf8; letter-spacing: 0.08em; text-transform: uppercase; }
        .briefing-meta { font-size: 0.65rem; color: #2d6080; margin-left: 8px; }
        .briefing-body { padding: 12px 14px; font-size: 0.78rem; line-height: 1.65; color: #c8d8e8; white-space: pre-wrap; font-family: Arial, sans-serif; }
        .briefing-body .b-section { color: #38bdf8; font-weight: 700; }
        .briefing-toggle { font-size: 0.62rem; color: #2d6080; cursor: pointer; padding: 2px 7px; border: 1px solid #0d2540; border-radius: 3px; background: transparent; flex-shrink: 0; }
        .briefing-toggle:hover { color: #38bdf8; border-color: rgba(56,189,248,0.3); }
        .briefing-divider { padding: 5px 12px; font-size: 0.65rem; font-weight: 700; color: #2d6080; letter-spacing: 0.06em; border-top: 1px solid #0a1e35; margin-top: 2px; }
        .news-card { padding: 8px 12px; border-bottom: 1px solid #0a1e35; background: #060d1c; }
        .news-card:hover { background: #071e38; }
        .news-card:last-child { border-bottom: none; }
        .news-title { color: #c8d8e8; font-size: 0.78rem; font-weight: 600; text-decoration: none; display: block; line-height: 1.4; }
        .news-title:hover { color: #38bdf8; }
        .news-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
        .news-source { font-size: 0.65rem; color: #38bdf8; background: rgba(56,189,248,0.1); padding: 1px 6px; border-radius: 3px; white-space: nowrap; }
        .news-ticker-tag { font-size: 0.65rem; color: #10b981; background: rgba(16,185,129,0.1); padding: 1px 6px; border-radius: 3px; font-weight: 700; }
        .news-snippet { font-size: 0.7rem; color: #6b7a8d; margin-top: 3px; line-height: 1.4; }
        .news-group-label { padding: 5px 12px; font-size: 0.65rem; font-weight: 700; color: #2d6080; letter-spacing: 0.06em; border-top: 1px solid #0a1e35; margin-top: 2px; text-transform: uppercase; }
        .loading-msg { padding: 20px; text-align: center; color: #9ca3af; }
        .seven-detail-row > td { padding: 0 !important; border-top: 2px solid #38bdf8; border-bottom: 2px solid #38bdf8; }
        .seven-detail-panel { background: #040c1a; }
        .seven-detail-header { padding: 6px 12px; font-size: 0.75rem; font-weight: 700; color: #38bdf8; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid #0a2545; display: flex; align-items: center; gap: 10px; }
        .seven-detail-header .sdh-stats { font-weight: 400; color: #2d6080; font-size: 0.7rem; letter-spacing: 0; text-transform: none; }
        .seven-detail-panel .ticker-table { margin: 0; width: auto; min-width: 100%; border-collapse: collapse; }
        .seven-detail-panel .ticker-table th { background: #050c18; color: #2d6080; font-size: 0.68rem; padding: 4px 8px; white-space: nowrap; border-bottom: 1px solid #091a30; }
        .seven-detail-panel .ticker-table td { padding: 4px 8px; font-size: 0.78rem; white-space: nowrap; border-bottom: 1px solid #040e1c; }
        .seven-detail-panel .ticker-row:hover > td { background: #0a2545; }
        .seven-detail-panel .ticker-row:last-child td { border-bottom: none; }
        .ticker-row.seven-expanded { background: #071e38 !important; }
        .ticker-row.seven-expanded > td:first-child { border-left: 3px solid #38bdf8; }
        .industry-sector-divider.ind-expanded { background: #071e38 !important; }
        .industry-sector-divider.ind-expanded > td:first-child { border-left: 3px solid #38bdf8; }
        .industry-detail-row > td { padding: 0 !important; border-top: 2px solid #38bdf8; border-bottom: 2px solid #38bdf8; }
        .market-breadth { margin-bottom: 10px; position: relative; }
        .multi-chart-panel { flex: 1; min-height: 0; overflow: auto; display: none; }
        .multi-group-title { margin: 8px 0 4px; font-size: 0.85rem; font-weight: 600; color: #9ca3af; }
        .multi-chart-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
        .econ-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .econ-modal {
            background: #060d1c; border-radius: 8px; border: 1px solid rgba(56,189,248,0.18);
            padding: 8px; max-width: 440px; width: 440px; max-height: 90vh; overflow: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(56,189,248,0.06);
        }
        .econ-modal-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
            font-size: 0.9rem; font-weight: 600; color: #d4e4f4;
        }
        .econ-modal-close { background: transparent; border: none; color: #2d6080; cursor: pointer; font-size: 1.2rem; padding: 0 4px; }
        .econ-modal-close:hover { color: #38bdf8; }
        .holdings-modal-overlay {
            position: fixed; inset: 0; background: transparent; display: none; z-index: 9999;
        }
        .holdings-modal {
            position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
            background: #060d1c; border-radius: 10px; border: 1px solid rgba(56,189,248,0.18);
            padding: 0; width: 280px; max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.85), 0 0 0 1px rgba(56,189,248,0.06);
            overflow: hidden;
        }
        .holdings-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: linear-gradient(180deg, #0e2140 0%, #081828 100%);
            border-bottom: 1px solid rgba(56,189,248,0.15); font-weight: 700; font-size: 0.82em;
            color: #38bdf8; letter-spacing: 0.03em; text-transform: uppercase;
        }
        .holdings-modal-close {
            background: transparent; border: none; color: #2d6080; cursor: pointer;
            font-size: 1rem; line-height: 1; padding: 0 2px;
            transition: color 0.15s;
        }
        .holdings-modal-close:hover { color: #38bdf8; }
        .holdings-list { overflow-y: auto; font-size: 0.8em; max-height: 320px; }
        .holdings-item {
            display: grid; grid-template-columns: 20px 1fr auto;
            align-items: center; gap: 8px;
            padding: 5px 12px; border-bottom: 1px solid #091a30;
            cursor: pointer; transition: background 0.1s;
        }
        .holdings-item:last-child { border-bottom: none; }
        .holdings-item:hover { background: #071e38; }
        .holdings-item.active { background: #0a2545; }
        .holdings-rank { color: #1a3550; font-size: 0.75em; text-align: right; font-variant-numeric: tabular-nums; }
        .holdings-symbol { font-weight: 700; color: #38bdf8; font-size: 0.95em; letter-spacing: 0.02em; }
        .holdings-weight { color: #10b981; }
        .holdings-gain { color: #10b981; }
        .holdings-loss { color: #ef4444; }
        .holdings-neutral { color: #3d7090; }
        .holdings-loading, .holdings-error { padding: 20px; text-align: center; }
        .holdings-error { color: #ef4444; }
        .gap-bar { display: flex; gap: 2px; align-items: center; justify-content: center; }
        .gap-dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }
        .gap-dot-up { background: #10b981; }
        .gap-dot-down { background: #ef4444; }
        .gap-dot-none { background: #0d2035; }
        .rel-perf-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        .rel-perf-table thead th { padding: 5px 8px; color: #2d6080; font-weight: 600; text-align: right; border-bottom: 1px solid #0a2035; }
        .rel-perf-table thead th:first-child { text-align: left; }
        .rel-perf-row td { padding: 5px 8px; border-bottom: 1px solid #0a1e35; }
        .rel-perf-row:last-child td { border-bottom: none; }
        .rel-perf-row:hover { background: #071828; }
        .rel-perf-name { color: #d4e4f4; white-space: nowrap; }
        .rel-perf-val { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 60px; }
        .rel-ticker-a { color: #38bdf8; font-weight: 700; font-size: 0.9em; }
        .rel-ticker-b { color: #3d7090; font-weight: 700; font-size: 0.9em; }
        .rel-highlight-pos { background: #10b98133; border-radius: 3px; padding: 1px 4px; }
        .rel-highlight-neg { background: #ef444433; border-radius: 3px; padding: 1px 4px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060d1c; }
        ::-webkit-scrollbar-thumb { background: #0e2540; border-radius: 4px; }
        /* Fear & Greed */
        .fg-gauge-wrap { display:flex; flex-direction:column; align-items:center; margin-bottom:14px; }
        .fg-score-num  { font-size:2rem; font-weight:700; margin-top:2px; }
        .fg-sentiment  { font-size:0.85rem; color:#3d7090; }
        .fg-grid       { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 2px; }
        .fg-card       { background:#071828; border-radius:6px; padding:8px 10px; border:1px solid #0a1e35; }
        .fg-card-lbl   { font-size:0.68rem; color:#2d6080; margin-bottom:3px; }
        .fg-card-score { font-size:1.05rem; font-weight:700; }
        .fg-card-det   { font-size:0.63rem; color:#1a3550; margin-top:2px; }
        .fg-bar-bg     { background:#0a1e35; border-radius:3px; height:5px; margin-top:5px; }
        .fg-bar-fill   { height:5px; border-radius:3px; }
        /* Fear & Greed Inline Panel */
        .fg-inline-panel { display:none; border:1px solid #0d2035; border-radius:0 0 8px 8px; border-top:none; background:#060d1c; overflow:hidden; margin-bottom:10px; }
        .fg-inline-panel.open { display:flex; }
        .fg-inline-col { display:flex; flex-direction:column; min-height:0; overflow-y:auto; padding:10px; max-height:560px; }
        .fg-inline-col-fg   { width:260px; flex-shrink:0; border-right:1px solid #0d2035; }
        .fg-inline-col-poly { flex:1; border-right:1px solid #0d2035; min-width:0; }
        .fg-inline-col-geo  { width:340px; flex-shrink:0; }
        .fg-inline-col-hdr  { font-size:0.72rem; font-weight:700; color:#2d6080; text-transform:uppercase; letter-spacing:0.07em; padding:0 2px 8px; border-bottom:1px solid #0a1e35; margin-bottom:8px; }
        .fg-toggle-btn.active { border-bottom-left-radius:0; border-bottom-right-radius:0; border-bottom-color:transparent; }
        /* FRED Macro Monitor */
        .fred-signal-banner { display:flex; gap:5px; flex-wrap:wrap; padding:10px 12px 4px; }
        .fred-pill { font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:3px; letter-spacing:0.04em; text-transform:uppercase; }
        .fred-pill-hawkish   { background:rgba(239,68,68,.12);  color:#ef4444; border:1px solid rgba(239,68,68,.3); }
        .fred-pill-dovish    { background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.3); }
        .fred-pill-tightening{ background:rgba(245,158,11,.12); color:#f59e0b; border:1px solid rgba(245,158,11,.3); }
        .fred-pill-neutral   { background:rgba(56,189,248,.10); color:#38bdf8; border:1px solid rgba(56,189,248,.25); }
        .fred-pill-mixed     { background:rgba(139,92,246,.12); color:#8b5cf6; border:1px solid rgba(139,92,246,.3); }
        .fred-narrative { padding:2px 12px 10px; font-size:0.78rem; color:#7ab8d8; border-bottom:1px solid #0a1e35; font-style:italic; }
        .fred-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:8px; }
        .fred-card { background:#071828; border-radius:6px; padding:7px 10px 6px; border-left:3px solid #1a3550; }
        .fred-card.hawkish    { border-left-color:#ef4444; }
        .fred-card.dovish     { border-left-color:#10b981; }
        .fred-card.tightening { border-left-color:#f59e0b; }
        .fred-card.mixed      { border-left-color:#8b5cf6; }
        .fred-card.neutral    { border-left-color:#38bdf8; }
        .fred-card-top { display:flex; justify-content:space-between; align-items:baseline; }
        .fred-card-label { font-size:0.63rem; color:#2d6080; text-transform:uppercase; letter-spacing:0.05em; }
        .fred-card-signal { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; }
        .fred-card-value { font-size:1.15rem; font-weight:700; color:#d4e4f4; line-height:1.2; margin-top:1px; }
        .fred-card-unit { font-size:0.7rem; font-weight:400; color:#3d7090; margin-left:1px; }
        .fred-card-change { font-size:0.65rem; margin-top:1px; }
        .fred-sparkline { width:100%; height:26px; object-fit:contain; margin-top:4px; display:block; }
    </style>
</head>
<body>

    function safeGroupId(name) {
        return name.replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }
    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function vizWidth(value, minVal, maxVal) {
        if (value == null) return 0;
        if (minVal >= maxVal) return 0;
        if (value >= 0) {
            if (maxVal <= 0) return 0;
            return Math.min(100, Math.max(0, (value / maxVal) * 100));
        }
        if (minVal >= 0) return 0;
        return Math.min(100, Math.max(0, (Math.abs(value) / Math.abs(minVal)) * 100));
    }

    function renderEvents(events) {
        var el = document.getElementById('events-modal-content');
        if (!el) return;
        var html = '';
        var calEvents = events || [];

        // Briefing — show content directly, no collapsible wrapper
        if (calEvents.length > 0 && calEvents[0].type === 'briefing') {
            var b = calEvents[0];
            calEvents = calEvents.slice(1);
            var rawText = (b.text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            var fmtText = rawText.replace(/^([A-Z][A-Z &]+—)/gm, '<span class="b-section">$1</span>');
            html += '<div class="briefing-body" style="padding:10px 14px">' + fmtText + '</div>';
            if (calEvents.length > 0) {
                html += '<div class="briefing-divider">UPCOMING MACRO EVENTS</div>';
            }
        }

        if (calEvents.length === 0 && !html) {
            el.innerHTML = '<div class="event-item">No high-importance U.S. macro events in the next 7 days.</div>';
            return;
        }
        html += calEvents.map(function(e) {
            return '<div class="event-item"><span class="event-datetime">' + (e.date || '') + ' ' + (e.time || '') + '</span><span class="event-name"> · ' + (e.event || '') + '</span></div>';
        }).join('');
        el.innerHTML = html;
    }
    window.toggleBriefing = function() {
        var body = document.getElementById('briefing-body');
        var btn  = document.getElementById('briefing-toggle-btn');
        if (!body) return;
        var collapsed = body.style.display === 'none';
        body.style.display = collapsed ? '' : 'none';
        if (btn) btn.innerHTML = collapsed ? '&#9660; collapse' : '&#9658; expand';
    };
    window.toggleNewsSection = function() {
        var panel = document.getElementById('news-inline-panel');
        var btn   = document.getElementById('news-toggle-btn');
        var isOpen = panel.classList.contains('open');
        if (isOpen) { panel.classList.remove('open'); btn.classList.remove('active'); }
        else        { panel.classList.add('open');    btn.classList.add('active'); }
    };

    var newsData = null;

    function renderNews(data) {
        var el = document.getElementById('news-panel-content');
        if (!el) return;
        if (!data || (!data.market.length && !Object.keys(data.movers || {}).length && !Object.keys(data.sectors || {}).length)) {
            el.innerHTML = '<div class="event-item" style="color:#6b7a8d">No news data available.</div>';
            return;
        }
        var html = '';

        // Market headlines
        if (data.market && data.market.length) {
            html += '<div class="news-group-label">Headlines</div>';
            data.market.forEach(function(h) {
                var snippet = (h.snippet || '').length > 140 ? h.snippet.substring(0, 140) + '...' : (h.snippet || '');
                html += '<div class="news-card">';
                html += '<a href="' + (h.url || '#') + '" target="_blank" rel="noopener" class="news-title">' + (h.title || 'Untitled') + '</a>';
                html += '<div class="news-meta">';
                if (h.source) html += '<span class="news-source">' + h.source + '</span>';
                if (h.category) html += '<span class="news-source" style="color:#f59e0b;background:rgba(245,158,11,0.1)">' + h.category + '</span>';
                html += '</div>';
                if (snippet) html += '<div class="news-snippet">' + snippet + '</div>';
                html += '</div>';
            });
        }

        // Mover headlines
        var moverTickers = Object.keys(data.movers || {});
        if (moverTickers.length) {
            html += '<div class="news-group-label">Mover News</div>';
            moverTickers.forEach(function(ticker) {
                (data.movers[ticker] || []).forEach(function(h) {
                    var snippet = (h.snippet || '').length > 120 ? h.snippet.substring(0, 120) + '...' : (h.snippet || '');
                    html += '<div class="news-card">';
                    html += '<a href="' + (h.url || '#') + '" target="_blank" rel="noopener" class="news-title">' + (h.title || 'Untitled') + '</a>';
                    html += '<div class="news-meta">';
                    html += '<span class="news-ticker-tag">' + ticker + '</span>';
                    if (h.source) html += '<span class="news-source">' + h.source + '</span>';
                    html += '</div>';
                    if (snippet) html += '<div class="news-snippet">' + snippet + '</div>';
                    html += '</div>';
                });
            });
        }

        // Sector headlines
        var sectorTickers = Object.keys(data.sectors || {});
        if (sectorTickers.length) {
            html += '<div class="news-group-label">Sector News</div>';
            sectorTickers.forEach(function(ticker) {
                (data.sectors[ticker] || []).forEach(function(h) {
                    var snippet = (h.snippet || '').length > 120 ? h.snippet.substring(0, 120) + '...' : (h.snippet || '');
                    html += '<div class="news-card">';
                    html += '<a href="' + (h.url || '#') + '" target="_blank" rel="noopener" class="news-title">' + (h.title || 'Untitled') + '</a>';
                    html += '<div class="news-meta">';
                    html += '<span class="news-ticker-tag">' + ticker + '</span>';
                    if (h.source) html += '<span class="news-source">' + h.source + '</span>';
                    html += '</div>';
                    if (snippet) html += '<div class="news-snippet">' + snippet + '</div>';
                    html += '</div>';
                });
            });
        }

        el.innerHTML = html;
    }

    function _cardOpen(id) {
        try { return !!(JSON.parse(localStorage.getItem('dash_cards') || '{}')[id]); } catch(e) { return false; }
    }

        try { var s = JSON.parse(localStorage.getItem('dash_cards') || '{}'); s[id] = open; localStorage.setItem('dash_cards', JSON.stringify(s)); } catch(e) {}

    function renderRelativePerf() {
        var pairs = [
            ["Tangibles vs. Intangibles",   "DBC",  "IGV"],
            ["AI 100 vs. Equal Weight",      "QQQ",  "RSP"],
            ["Cyclicals vs. Defensives",     "XLY",  "XLP"],
            ["US vs. International",         "SPY",  "EFA"],
            ["Pure Value vs. Growth",        "IVE",  "IVW"],
            ["Early Cycle vs. Late Cycle",   "XLB",  "XLU"],
            ["Large Cap vs. Small Cap",      "SPY",  "IWM"],
            ["Software vs. Semis",           "IGV",  "SMH"],
            ["Mag7 vs Nasdaq",               "MAGS", "QQQ"],
            ["Tech vs Semi",                 "QQQ",  "SOXX"]
        ];
        var lookup = {};
        if (snapshot && snapshot.groups) {
            Object.values(snapshot.groups).forEach(function(tickers) {
                tickers.forEach(function(t) { lookup[t.ticker] = t; });
            });
        }
        function relFmt(a, b, field) {
            if (!a || !b || a[field] == null || b[field] == null) return '<span style="color:#4b5563">-</span>';
            var val = a[field] - b[field];
            var str = (val > 0 ? '+' : '') + val.toFixed(2) + '%';
            var cls = val > 0 ? 'price-up' : (val < 0 ? 'price-down' : '');
            var hlCls = Math.abs(val) >= 3 ? (val > 0 ? ' rel-highlight-pos' : ' rel-highlight-neg') : '';
            return '<span class="' + cls + hlCls + '">' + str + '</span>';
        }
        var _rpOpen = _cardOpen('rel-perf');
        var html = '<div class="group-container" id="group-rel-perf">';
        html += '<div class="group-header" onclick="toggleCard(\'rel-perf\',event)">';
        html += '<div class="card-left"><span class="card-chevron' + (_rpOpen ? ' open' : '') + '" id="card-chev-rel-perf">&#9658;</span>';
        html += '<span class="group-header-title">Relative Performance</span>';
        html += '<span class="card-summary">' + pairs.length + ' pairs</span></div>';
        html += '</div>';
        html += '<div class="card-body" id="card-body-rel-perf" style="' + (_rpOpen ? '' : 'display:none') + '">';
        html += '<table class="rel-perf-table"><thead><tr>';
        html += '<th>Pair</th><th>Daily</th><th>5D</th><th>YTD</th></tr></thead><tbody>';
        pairs.forEach(function(p) {
            var name = p[0], tA = p[1], tB = p[2];
            var a = lookup[tA], b = lookup[tB];
            html += '<tr class="rel-perf-row">';
            html += '<td class="rel-perf-name"><span class="rel-ticker-a">' + tA + '</span> <span style="color:#4b5563">vs.</span> <span class="rel-ticker-b">' + tB + '</span> &nbsp;<span style="color:#6b7280;font-size:0.85em">' + name + '</span></td>';
            html += '<td class="rel-perf-val">' + relFmt(a, b, 'daily') + '</td>';
            html += '<td class="rel-perf-val">' + relFmt(a, b, '5d') + '</td>';
            html += '<td class="rel-perf-val">' + relFmt(a, b, 'ytd') + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    window.showThemeTooltip = function(e, dataJson) {
        var tt = document.getElementById('theme-constituent-tooltip');
        var constituents = JSON.parse(dataJson);
        var inner = constituents.map(function(c) {
            var color = c.d > 0 ? '#10b981' : (c.d < 0 ? '#ef4444' : '#9ca3af');
            var str = c.d != null ? (c.d > 0 ? '+' : '') + c.d.toFixed(2) + '%' : '-';
            return '<div style="display:flex;justify-content:space-between;gap:16px"><span style="color:#9ca3af">' + c.t + '</span><span style="color:' + color + ';font-weight:600">' + str + '</span></div>';
        }).join('');
        tt.innerHTML = inner;
        tt.style.display = 'block';
        tt.style.left = (e.clientX + 12) + 'px';
        tt.style.top = (e.clientY - 10) + 'px';
    };

        document.getElementById('theme-constituent-tooltip').style.display = 'none';

                var wtdCl = wtd != null ? (wtd > 0 ? 'price-up' : (wtd < 0 ? 'price-down' : '')) : '';
                var ytdCl = ytd != null ? (ytd > 0 ? 'price-up' : (ytd < 0 ? 'price-down' : '')) : '';
                html += '<td class="' + wtdCl + '">' + (wtd != null ? '<div class="value-visualization"><div class="value-bar ' + (wtd >= 0 ? 'positive' : 'negative') + '" style="width:' + wtdW + '%"></div><span class="value-text">' + (wtd >= 0 ? '+' : '') + wtd.toFixed(2) + '%</span></div>' : na) + '</td>';
                html += '<td class="' + fiveCl + '">' + (five != null ? '<div class="value-visualization"><div class="value-bar ' + (five >= 0 ? 'positive' : 'negative') + '" style="width:' + fiveW + '%"></div><span class="value-text">' + (five >= 0 ? '+' : '') + five.toFixed(2) + '%</span></div>' : na) + '</td>';
                html += '<td class="' + twentyCl + '">' + (twenty != null ? '<div class="value-visualization"><div class="value-bar ' + (twenty >= 0 ? 'positive' : 'negative') + '" style="width:' + twentyW + '%"></div><span class="value-text">' + (twenty >= 0 ? '+' : '') + twenty.toFixed(2) + '%</span></div>' : na) + '</td>';
                html += '<td class="' + ytdCl + '">' + (ytd != null ? '<div class="value-visualization"><div class="value-bar ' + (ytd >= 0 ? 'positive' : 'negative') + '" style="width:' + ytdW + '%"></div><span class="value-text">' + (ytd >= 0 ? '+' : '') + ytd.toFixed(2) + '%</span></div>' : na) + '</td>';
                var volRatio = r.vol_ratio;
                var volCl = volRatio != null && volRatio >= 2 ? 'price-down' : '';
                html += '<td class="' + volCl + '">' + (volRatio != null ? volRatio.toFixed(2) + 'x' : na) + '</td>';
                html += '<td>' + (r.vol_chart ? '<img src="' + r.vol_chart + '" class="rs-chart" alt="Vol">' : na) + '</td>';
                html += '<td>' + (r.atr_pct != null ? r.atr_pct.toFixed(1) + '%' : na) + '</td>';
                // EM% — tonight's expected move (ATM straddle, next expiry)
                var emCell = r.em_pct != null
                    ? '<span style="color:#94a3b8">±' + r.em_pct.toFixed(1) + '%</span>'
                      + (r.em_days != null ? '<span style="font-size:0.6rem;color:#2d6080"> ' + r.em_days + 'd</span>' : '')
                    : na;
                html += '<td style="text-align:right;white-space:nowrap">' + emCell + '</td>';
                // Beat? — did today's actual move exceed yesterday's EM?
                var beatCell = na;
                if (r.em_pct != null && r.daily != null && emYesterday[r.ticker] != null) {
                    var _actual = Math.abs(r.daily);
                    var _exp = emYesterday[r.ticker];
                    var _ratio = _actual / _exp;
                    if (_actual > _exp) {
                        beatCell = '<span style="color:#ef4444" title="Overshot: actual ' + _actual.toFixed(1) + '% vs expected ±' + _exp.toFixed(1) + '%">✗ ' + _ratio.toFixed(1) + '×</span>';
                    } else {
                        beatCell = '<span style="color:#10b981" title="Within range: actual ' + _actual.toFixed(1) + '% vs expected ±' + _exp.toFixed(1) + '%">✓ ' + _ratio.toFixed(1) + '×</span>';
                    }
                }
                html += '<td style="text-align:right">' + beatCell + '</td>';
                html += '<td>' + (r.dist_sma50_atr != null ? r.dist_sma50_atr.toFixed(2) : na) + '</td>';
                var _rsc = r.rs_composite != null ? Math.round(r.rs_composite) : (r.rs != null ? Math.round(r.rs) : null);
                var _rscCl = _rsc != null ? (_rsc >= 70 ? 'color:#10b981' : _rsc <= 30 ? 'color:#ef5350' : 'color:#c8d8e8') : '';
                html += '<td style="' + _rscCl + '">' + (_rsc != null ? _rsc + '%' : na) + '</td>';
                html += '<td>' + (r.rs_chart ? '<img src="' + r.rs_chart + '" class="rs-chart" alt="RS">' : na) + '</td>';
                if (!isSummaryGroup) {
                    html += '<td>';
                    if (r.gaps && r.gaps.length) {
                        html += '<div class="gap-bar">';
                        for (var gi = r.gaps.length - 1; gi >= 0; gi--) {
                            var gapVal = r.gaps[gi];
                            var cls = gapVal === 'up' ? 'gap-dot-up' : (gapVal === 'down' ? 'gap-dot-down' : 'gap-dot-none');
                            var tip = 'D-' + (gi + 1) + (gapVal ? ': gap ' + gapVal : '');
                            html += '<div class="gap-dot ' + cls + '" title="' + tip + '"></div>';
                        }
                        html += '</div>';
                    } else if (r.gap_dir) {
                        html += '<div class="gap-bar">';
                        for (var li = 4; li >= 0; li--) {
                            var dayNum = li + 1;
                            var lcls = (dayNum === r.gap_days) ? (r.gap_dir === 'up' ? 'gap-dot-up' : 'gap-dot-down') : 'gap-dot-none';
                            var ltip = 'D-' + dayNum + (dayNum === r.gap_days ? ': gap ' + r.gap_dir : '');

                    } else {

                    }
                    html += '</td>';
                }

            }
            html += '</tbody></table></div></div>';
        }

        if (meta && meta.Industries_COLORS) {
            var style = document.createElement('style');
            var css = '';

                css += '.ticker-label-' + t + '{background-color:' + meta.Industries_COLORS[t] + ';color:white} ';
            style.textContent = css;
            document.head.appendChild(style);
        }

        initApp();
    }

    function buildMultiChartForGroup(groupName) {
        var panel = document.getElementById('multi-chart-panel');
        if (!panel) return;
        panel.innerHTML = '';
        if (window._multiCharts) {
            window._multiCharts.forEach(function(c) { try { c.remove(); } catch(e) {} });
        }
        window._multiCharts = [];
        var gc = document.getElementById('group-' + safeGroupId(groupName));
        if (!gc) return;
        var table = gc.querySelector('table.ticker-table');
        if (!table) return;
        var rows = [].slice.call(table.querySelectorAll('.ticker-row'));
        if (!rows.length) return;
        var title = document.createElement('div');
        title.className = 'multi-group-title';
        title.textContent = groupName;
        var grid = document.createElement('div');
        grid.className = 'multi-chart-grid';
        rows.forEach(function(row) {
            var sym = (row.getAttribute('data-symbol') || '').trim();
            if (!sym) return;
            var wrap = document.createElement('div');
            wrap.style.cssText = 'height:280px;width:100%;border:1px solid rgba(255,255,255,0.06);border-radius:4px;position:relative';
            var label = document.createElement('div');
            label.style.cssText = 'position:absolute;top:4px;left:8px;z-index:2;font-size:11px;font-weight:700;color:#d4e4f4;opacity:0.8;pointer-events:none';
            label.textContent = sym;
            wrap.appendChild(label);
            grid.appendChild(wrap);
            (function(el, s) {
                var safe = s.replace(/[^a-zA-Z0-9]/g, '_');
                function render(data) {
                    if (!data || !data.ohlc || !data.ohlc.length) return;
                    requestAnimationFrame(function() {
                        var chart = LightweightCharts.createChart(el, {
                            layout: { background: { type: 'solid', color: '#1a1a1a' }, textColor: '#d1d4dc' },
                            grid: { vertLines: { color: 'rgba(255,255,255,0.04)' }, horzLines: { color: 'rgba(255,255,255,0.04)' } },
                            rightPriceScale: { borderVisible: false },
                            timeScale: { borderVisible: false, visible: false },
                            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                            width: el.clientWidth, height: el.clientHeight,
                            handleScroll: false, handleScale: false,
                        });
                        var cs = chart.addCandlestickSeries({
                            upColor: '#26a69a', downColor: '#ef5350',
                            borderUpColor: '#26a69a', borderDownColor: '#ef5350',
                            wickUpColor: '#26a69a', wickDownColor: '#ef5350',
                        });
                        cs.setData(data.ohlc.map(function(d) { return { time: d.t, open: d.o, high: d.h, low: d.l, close: d.c }; }));
                        var sma50 = computeSMA(data.ohlc, 50);
                        if (sma50.length) {
                            chart.addLineSeries({ color: '#FF9800', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false })
                                .setData(sma50);
                        }
                        // S/R lines
                        var srData = null;
                        if (snapshot && snapshot.groups) {
                            Object.values(snapshot.groups).forEach(function(rows) {
                                rows.forEach(function(r) { if (r.ticker === s && r.sr) srData = r.sr; });
                            });
                        }
                        if (srData) {
                            (srData.resistance || []).forEach(function(lvl) {
                                cs.createPriceLine({ price: lvl.price, color: '#f59e0b', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false, title: '' });
                            });
                            (srData.support || []).forEach(function(lvl) {
                                cs.createPriceLine({ price: lvl.price, color: '#38bdf8', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false, title: '' });
                            });
                        }
                        chart.timeScale().fitContent();
                        window._multiCharts.push(chart);
                    });
                }
                if (ohlcCache[safe]) { render(ohlcCache[safe]); }
                else {
                    fetch('data/ohlc/' + safe + '.json')
                        .then(function(r) { return r.ok ? r.json() : null; })
                        .then(function(data) { if (data) ohlcCache[safe] = data; render(data); })
                        .catch(function() {});
                }
            })(wrap, sym);
        });
        panel.appendChild(title);
        panel.appendChild(grid);
    }

                var d5 = m.delta_5d;

                html += '<div style="padding:7px 12px;border-bottom:1px solid #070f1c">' +
                    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">' +

            html += '<div style="text-align:center;padding:4px 0 2px;font-size:0.6rem;color:#1a3550">Polymarket · ' + geoBuilt + '</div>';

    function renderFearGreed() {

            if (vs_ma >  10) return '#f97316';
            if (vs_ma >   0) return '#eab308';
            if (vs_ma > -10) return '#22c55e';
            return '#10b981';

            if (vs_ma == null) return '—';
            if (vs_ma >  30) return 'Spiking';
            if (vs_ma >  10) return 'Elevated';

            if (vs_ma > -10) return 'Normal';

                html += '<span style="font-size:0.6rem;color:#4b5563">' + item.desc + '</span>';

                    html += '<div style="font-size:1.3rem;font-weight:700;color:' + col + ';line-height:1.1">' + item.current.toFixed(2) + '</div>';
                    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">';
                    html += '<span style="font-size:0.62rem;color:' + col + ';font-weight:600">' + lbl + '</span>';
                    html += '<span style="font-size:0.6rem;color:#4b5563" title="vs 20D MA">'
                          + (item.vs_ma >= 0 ? '+' : '') + item.vs_ma.toFixed(1) + '% vs MA</span>';

        var comps  = liq.components || [];
        var raw    = liq.raw || liq;
        var flinks = liq.fred_links || {};

            if (v == null) return '—';
            if (unit === 'B') return v >= 1000 ? (v/1000).toFixed(1) + 'T' : v.toFixed(0) + 'B';
            return v.toFixed(4) + '%';
        }
        function fredLink(sid) {
            var url = flinks[sid] || ('https://fred.stlouisfed.org/series/' + sid);
            return '<a href="' + url + '" target="_blank" style="color:#2d6080;font-size:0.5rem;text-decoration:none" title="Verify on FRED">FRED &#8599;</a>';
        }

        var html = '<div style="padding:10px 12px">';

        // ── Composite gauge ────────────────────────────────────────────────────

        html += '</div>';
        html += '<div style="flex:1">';

        html += '<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:5px">';
        html += '<div style="flex:25;background:#22c55e40"></div><div style="flex:25;background:#38bdf840"></div>';
        html += '<div style="flex:25;background:#f9731640"></div><div style="flex:25;background:#ef444440"></div>';
        html += '</div>';
        // Marker
        html += '<div style="position:relative;height:0">';
        html += '<div style="position:absolute;left:' + (score || 0) + '%;top:-11px;transform:translateX(-50%);width:3px;height:10px;background:' + sCol + ';border-radius:1px"></div>';

        // ── Raw metric cards ───────────────────────────────────────────────────

    // Sparkline toggle + draw
    window.liqToggleSpark = function(compId) {
        var wrap = document.getElementById('liq-spark-' + compId + '-wrap');
        if (!wrap) return;
        var vis = wrap.style.display !== 'none';
        wrap.style.display = vis ? 'none' : 'block';
        if (!vis) {
            var liq = snapshot && snapshot.macro && snapshot.macro.usd_liquidity;
            var comp = (liq && liq.components || []).filter(function(c) { return c.id === compId; })[0];
            if (comp) liqDrawSpark(comp);
        }
    };

    function liqDrawSpark(comp) {
        var canvas = document.getElementById('liq-spark-' + comp.id);
        if (!canvas || !comp.history || comp.history.length < 2) return;
        var ctx = canvas.getContext('2d');
        var w = canvas.width, h = canvas.height;
        var vals = comp.history.map(function(p) { return p.v; });
        var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals);
        var rng = mx - mn || 1;
        ctx.clearRect(0, 0, w, h);
        // Fill area
        ctx.beginPath();
        ctx.moveTo(0, h);
        for (var i = 0; i < vals.length; i++) {
            var x = (i / (vals.length - 1)) * w;
            var y = h - 4 - ((vals[i] - mn) / rng) * (h - 8);
            ctx.lineTo(x, y);
        }
        ctx.lineTo(w, h);
        ctx.closePath();
        var pc = comp.percentile > 75 ? '#ef4444' : comp.percentile > 50 ? '#f97316' : comp.percentile > 25 ? '#38bdf8' : '#22c55e';
        ctx.fillStyle = pc + '15';
        ctx.fill();
        // Line
        ctx.beginPath();
        for (var j = 0; j < vals.length; j++) {
            var lx = (j / (vals.length - 1)) * w;
            var ly = h - 4 - ((vals[j] - mn) / rng) * (h - 8);
            if (j === 0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
        }
        ctx.strokeStyle = pc;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Current dot
        var lastX = w, lastY = h - 4 - ((vals[vals.length-1] - mn) / rng) * (h - 8);
        ctx.beginPath();
        ctx.arc(lastX, lastY, 3, 0, Math.PI*2);
        ctx.fillStyle = pc;
        ctx.fill();
    }

    // ── Fed Watch ─────────────────────────────────────────────────────────────
    var fedwatchData = null;

    function renderFedWatch() {

            fetch('data/fedwatch.json')
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(d) { fedwatchData = d; renderFedWatch(); })
                .catch(function() {
                    el.innerHTML = '<div style="padding:16px;color:#9ca3af;font-size:0.75rem">Failed to load fedwatch.json</div>';

        var fw      = fedwatchData;

        var daysToFomc = null;

            daysToFomc = Math.ceil((new Date(mkt.next_fomc_date + 'T00:00:00') - new Date()) / 86400000);
        }

        // Staleness helpers
        function daysAgo(dateStr) {
            if (!dateStr) return 999;
            return Math.floor((new Date() - new Date(dateStr + 'T00:00:00')) / 86400000);
        }
        function staleTag(dateStr, threshold, label) {
            var d = daysAgo(dateStr);
            if (d <= threshold) return '';
            return '<span title="Last updated ' + d + ' days ago — fetch may have failed" '
                 + 'style="font-size:0.48rem;background:#7c2d12;color:#fca5a5;padding:1px 4px;border-radius:2px;margin-left:4px;vertical-align:middle">'

            html += '<div style="background:#1c0a03;border:1px solid #7c2d12;border-radius:4px;padding:7px 10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">';
            html += '<span style="font-size:0.65rem;color:#fca5a5">Data is ' + overallAge + ' days old — GitHub Actions workflow may have failed.</span>';

        html += '</div>';

        var uCol = mkt.unemployment != null ? (mkt.unemployment > 5 ? '#ef4444' : mkt.unemployment > 4.5 ? '#f97316' : '#10b981') : '#4b5563';

        var holdPct = mkt.rate_hold_pct || 0;

        html += '<div style="background:#060d1c;border:1px solid #0a1e35;border-radius:4px;padding:8px 10px;margin-bottom:10px">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">';

        html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">';
        [

               + ' <span style="color:#4b5563;font-weight:400">· ' + m.stance + '</span></div>';

    function renderMacroFred() {
        var el = document.getElementById('fred-macro-content');
        if (!el) return;
        var mf = snapshot && snapshot.macro_fred;
        if (!mf || !mf.series || Object.keys(mf.series).length === 0) {
            el.innerHTML = '<div style="padding:20px;color:#2d6080;text-align:center;font-size:0.82rem">No FRED data — add <code>FRED_API_KEY</code> secret in GitHub repo settings and re-run the workflow.</div>';
            return;
        }
        var SIG_COL = {hawkish:'#ef4444',dovish:'#10b981',tightening:'#f59e0b',neutral:'#38bdf8',mixed:'#8b5cf6'};
        var CAT_ICON = {'Inflation':'🌡️','Employment':'👷','Interest Rates':'📈'};
        var categories = mf.categories || ['Inflation','Employment','Interest Rates'];

        function fmtDate(d) {
            if (!d) return '—';
            var parts = d.split('-');
            if (parts.length !== 3) return d;
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return months[parseInt(parts[1],10)-1] + ' ' + parseInt(parts[2],10);
        }

        function fmtVal(d) {
            if (d.value == null) return '—';
            if (d.unit === '$') return '$' + d.value.toFixed(1);
            if (d.unit === 'k') return (d.value > 0 ? '+' : '') + d.value.toFixed(0) + 'k';
            return d.value.toFixed(1) + (d.unit || '');
        }

        function fmtFc(val, unit) {
            if (val == null) return '—';
            if (unit === '$') return '$' + val.toFixed(1);
            if (unit === 'k') return (val > 0 ? '+' : '') + val.toFixed(0) + 'k';
            return val.toFixed(1) + (unit || '');
        }

        function makeRow(sid) {
            var d = mf.series[sid]; if (!d) return '';
            var col = SIG_COL[d.signal] || '#38bdf8';
            var actualStr = fmtVal(d);
            var fcStr     = fmtFc(d.forecast, d.unit);
            var nextFcStr = fmtFc(d.next_forecast, d.unit);

            // Δ actual vs forecast
            var deltaStr = '—', deltaStyle = 'color:#1e4060';
            if (d.forecast != null && d.value != null) {
                var diff = parseFloat((d.value - d.forecast).toFixed(2));
                if (Math.abs(diff) >= 0.05) {
                    deltaStr  = (diff > 0 ? '+' : '') + diff.toFixed(1);
                    deltaStyle = diff > 0 ? 'color:#f59e0b' : 'color:#38bdf8';
                } else {
                    deltaStr = '≈'; deltaStyle = 'color:#2d6080';
                }
            }

            var relStr  = fmtDate(d.release_date || d.last_date);
            var nextStr = fmtDate(d.next_release);

            return '<tr style="border-bottom:1px solid #071628">' +
                '<td style="padding:5px 8px;color:#7ab8d8;font-weight:600;white-space:nowrap">' + d.label + '</td>' +
                '<td style="padding:5px 4px;text-align:right;color:' + col + ';font-weight:700">' + actualStr + '</td>' +
                '<td style="padding:5px 4px;text-align:right;color:#3d7090">' + fcStr + '</td>' +
                '<td style="padding:5px 4px;text-align:right;' + deltaStyle + '">' + deltaStr + '</td>' +
                '<td style="padding:5px 4px;text-align:right;color:#1e4060;white-space:nowrap">' + relStr + '</td>' +
                '<td style="padding:5px 4px;text-align:right;color:#2d6080;white-space:nowrap">' + nextStr + '</td>' +
                '<td style="padding:5px 8px;text-align:right;color:#38bdf8">' + nextFcStr + '</td>' +
            '</tr>';
        }

        // Single table with colgroup so columns stay aligned across all category sections
        var COLGROUP = '<colgroup>' +
            '<col>' +
            '<col style="width:76px">' +
            '<col style="width:62px">' +
            '<col style="width:48px">' +
            '<col style="width:72px">' +
            '<col style="width:72px">' +
            '<col style="width:72px">' +
            '</colgroup>';

        function catHeaderRows(cat) {
            return '<tr><td colspan="7" style="padding:10px 8px 2px;font-size:0.68rem;font-weight:700;color:#2d6080;letter-spacing:0.07em">' +
                (CAT_ICON[cat] || '') + '\u00a0\u00a0' + cat.toUpperCase() + '</td></tr>' +
                '<tr style="font-size:0.6rem;color:#1e4060;letter-spacing:0.04em;text-transform:uppercase">' +
                '<th style="text-align:left;padding:4px 8px;font-weight:600">Metric</th>' +
                '<th style="text-align:right;padding:4px 4px">Actual</th>' +
                '<th style="text-align:right;padding:4px 4px">Est.</th>' +
                '<th style="text-align:right;padding:4px 4px">Δ</th>' +
                '<th style="text-align:right;padding:4px 4px">Released</th>' +
                '<th style="text-align:right;padding:4px 4px">Next</th>' +
                '<th style="text-align:right;padding:4px 8px">Next Est.</th>' +
                '</tr>';
        }

        function makeYtdRow(ytd) {
            var cur  = ytd.ytd_current != null ? (ytd.ytd_current >= 0 ? '+' : '') + ytd.ytd_current + 'k' : '—';
            var prev = ytd.ytd_prev    != null ? (ytd.ytd_prev    >= 0 ? '+' : '') + ytd.ytd_prev    + 'k' : '—';
            var diff = '—', diffStyle = 'color:#1e4060';
            if (ytd.ytd_diff != null) {
                diff = (ytd.ytd_diff >= 0 ? '+' : '') + ytd.ytd_diff + 'k';
                diffStyle = ytd.ytd_diff >= 0 ? 'color:#f59e0b' : 'color:#38bdf8';
            }
            var vsLabel = ytd.ytd_prev_year ? 'vs ' + ytd.ytd_prev_year : '';
            return '<tr style="border-bottom:1px solid #071628;background:rgba(0,20,40,0.3)">' +
                '<td style="padding:4px 8px 4px 20px;color:#4a7a9a;font-size:0.72rem;white-space:nowrap">↳ YTD ' + (ytd.ytd_year || '') + '</td>' +
                '<td style="padding:4px 4px;text-align:right;color:#7ab8d8;font-weight:600;font-size:0.72rem">' + cur + '</td>' +
                '<td style="padding:4px 4px;text-align:right;color:#3d7090;font-size:0.72rem" title="Same period ' + (ytd.ytd_prev_year || '') + '">' + prev + '</td>' +
                '<td style="padding:4px 4px;text-align:right;' + diffStyle + ';font-size:0.72rem">' + diff + '</td>' +
                '<td colspan="3" style="padding:4px 8px;text-align:right;color:#1e4060;font-size:0.65rem">' + vsLabel + ' same period</td>' +
                '</tr>';
        }

        var html = '<table style="width:100%;border-collapse:collapse;font-size:0.76rem">' + COLGROUP + '<tbody>';
        categories.forEach(function(cat) {
            var sids = (mf.series_order || Object.keys(mf.series)).filter(function(sid) {
                return mf.series[sid] && mf.series[sid].category === cat;
            });
            if (!sids.length) return;
            html += catHeaderRows(cat);
            sids.forEach(function(sid) {
                html += makeRow(sid);
                if (sid === 'PAYEMS' && mf.payems_ytd && mf.payems_ytd.ytd_current != null) {
                    html += makeYtdRow(mf.payems_ytd);
                }
            });
        });
        html += '</tbody></table>';
        html += '<div style="text-align:center;padding:6px 0 2px;font-size:0.6rem;color:#1a3550">Actual: FRED · Release dates: FRED calendar · Consensus estimates: Perplexity</div>';
        el.innerHTML = html;
    }

    function renderCorrelation() {

                else { bg = 'rgba(239,83,80,' + (Math.abs(v) * 0.45) + ')'; fg = Math.abs(v) > 0.5 ? '#fff' : '#c8d8e8'; }
                html += '<td style="text-align:center;padding:3px 2px;background:' + bg + ';color:' + fg + '">' + (v != null ? v.toFixed(2) : '-') + '</td>';
            }
            html += '</tr>';
        }
        html += '</table></div>';

    function renderFactorRegime() {

        var order = ['VLUE','MTUM','QUAL','SIZE','IWF'];

            VLUE: 'If BULL, market favors cheap stocks (low P/E, P/B) over expensive ones.',
            MTUM: 'If BULL, recent winners keep winning — trend-following is working.',
            QUAL: 'If BULL, high-profit, low-debt companies are outperforming.',

            IWF: 'If BULL, high-growth / high-valuation stocks are leading the market.'

        html += 'Each factor is tracked vs SPY. BULL = outperforming, BEAR = underperforming. Z-score shows strength (\u00b10.3 mild, \u00b11.0+ strong).';
        html += '</div>';

            html += '<div style="font-size:0.6rem;color:#4b5563;margin-top:1px;font-style:italic">' + (factorGuide[ftk] || '') + '</div>';
            html += '</div>';
        });
        html += '</div>';
        el.innerHTML = html;

        var GROUP_MAP = { indices: 'Indices', sevens: 'The 7s at a Glance', industries: 'Industries', sectors: 'Sel Sectors', countries: 'Countries' };
        var gname = GROUP_MAP[tab];
        var el = document.getElementById('rot-content-' + tab);
        if (!el || !snapshot || !snapshot.groups || !snapshot.groups[gname]) {
            if (el) el.innerHTML = '<div style="padding:20px;color:#2d6080">No data — run build_data.py first.</div>';
            return;
        }
        var currentRows = snapshot.groups[gname].filter(function(r) { return r.ticker && r['20d'] != null && !r.is_rrg_row; });
        var sorted = currentRows.slice().sort(function(a,b) { return (b['20d']||0) - (a['20d']||0); });
        var currentRankMap = {};
        sorted.forEach(function(r,i) { currentRankMap[r.ticker] = i + 1; });

        // Find snapshot ~7 days ago from rotation history
        var prevSnap = null;
        var prevDate = null;
        if (rotationData && rotationData.snapshots && rotationData.snapshots.length >= 2) {
            var snaps = rotationData.snapshots;
            var target = Date.now() - 7 * 86400000;
            var bestDiff = Infinity;
            for (var i = 0; i < snaps.length - 1; i++) {
                var d = new Date(snaps[i].date).getTime();
                var diff = Math.abs(d - target);
                if (diff < bestDiff) { bestDiff = diff; prevSnap = snaps[i]; }
            }
            if (prevSnap) prevDate = prevSnap.date;
        }

        var prevData = prevSnap && prevSnap.groups && prevSnap.groups[gname] ? prevSnap.groups[gname] : null;
        var prevRankMap = null;
        if (prevData) {
            var prevTickers = Object.keys(prevData).filter(function(t) { return prevData[t]['20d'] != null; });
            var prevSorted = prevTickers.slice().sort(function(a,b) { return (prevData[b]['20d']||0) - (prevData[a]['20d']||0); });
            prevRankMap = {};
            prevSorted.forEach(function(t,i) { prevRankMap[t] = i + 1; });
        }

        // Detect zero-crossover signals
        var crossPos = [], crossNeg = [];
        if (prevData) {
            sorted.forEach(function(r) {
                var prev20 = prevData[r.ticker] ? prevData[r.ticker]['20d'] : null;
                if (prev20 == null) return;
                if (r['20d'] > 0 && prev20 <= 0) crossPos.push(r.ticker);
                if (r['20d'] <= 0 && prev20 > 0) crossNeg.push(r.ticker);
            });
        }

        // Top movers (biggest rank jumps)
        var movers = sorted.map(function(r) {
            var pr = prevRankMap ? (prevRankMap[r.ticker] || null) : null;
            return { ticker: r.ticker, delta: pr ? (pr - currentRankMap[r.ticker]) : null };
        }).filter(function(m) { return m.delta != null; });
        var topUp   = movers.slice().sort(function(a,b){return b.delta-a.delta;}).slice(0,3).filter(function(m){return m.delta>0;});
        var topDown = movers.slice().sort(function(a,b){return a.delta-b.delta;}).slice(0,3).filter(function(m){return m.delta<0;});

        var html = '';

        // Signals bar
        var hasSignals = crossPos.length || crossNeg.length || topUp.length || topDown.length;
        if (hasSignals) {
            html += '<div style="padding:6px 10px;border-bottom:1px solid #0a1e35;display:flex;gap:5px;flex-wrap:wrap;align-items:center">';
            crossPos.forEach(function(t) {
                html += '<span style="font-size:0.63rem;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25)">↑ '+t+' 20D crossed +0</span>';
            });
            crossNeg.forEach(function(t) {
                html += '<span style="font-size:0.63rem;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)">↓ '+t+' 20D crossed -0</span>';
            });
            topUp.forEach(function(m) {
                html += '<span style="font-size:0.63rem;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(16,185,129,.08);color:#10b981;border:1px solid rgba(16,185,129,.15)">▲'+m.delta+' '+m.ticker+'</span>';
            });
            topDown.forEach(function(m) {
                html += '<span style="font-size:0.63rem;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.15)">▼'+Math.abs(m.delta)+' '+m.ticker+'</span>';
            });
            html += '</div>';
        }

        // Meta line
        var vsStr = prevDate ? 'vs ' + prevDate : 'no history yet — check back after next build';
        html += '<div style="padding:4px 10px 3px;font-size:0.62rem;color:#1a3550;border-bottom:1px solid #070f1c">'+sorted.length+' tickers · ranked by 20D return · '+vsStr+'</div>';

        // Table
        html += '<table style="width:100%;border-collapse:collapse;font-size:0.72rem">';
        var rth = function(label, tip, align) {
            var a = align || 'right';
            return '<th style="padding:4px 8px;text-align:'+a+';color:#2d6080;font-weight:600;border-bottom:1px solid #0a1e35;white-space:nowrap;cursor:default" title="'+tip+'">'
                + label + ' <span style="font-size:0.6rem;color:#1a3550;vertical-align:middle">ⓘ</span></th>';
        };
        html += '<thead><tr style="background:#071628">'
            + rth('Rank', 'Position in this group ranked by 20-day return.\n#1 = strongest 20D performer, last = weakest.\nUpdated daily.', 'left')
            + '<th style="padding:4px 8px;text-align:left;color:#2d6080;font-weight:600;border-bottom:1px solid #0a1e35">Ticker</th>'
            + rth('20D%', 'Total % return over the past 20 trading days (~1 calendar month).\nThis is the primary sort key — the ranking is based on this number.')
            + rth('5D%', 'Total % return over the past 5 trading days (~1 week).\nUseful for spotting recent acceleration or fading momentum.')
            + rth('Daily%', "Yesterday's single-day % return.\nHelps identify intraday momentum or sudden reversals.")
            + rth('Δ Rank', 'HOW RANKING WORKS:\nAll tickers in this group are sorted by 20D return, best to worst.\n#1 = highest 20D return in the group, last = lowest.\n\nWHAT Δ RANK MEANS:\nCompares today\'s rank vs the same ticker\'s rank ~7 days ago.\n▲3 = moved UP 3 spots (20D return improved relative to peers).\n▼3 = dropped 3 spots (peers outpaced it over the week).\n— = no snapshot from 7 days ago available yet.')
            + rth('RS', 'Volatility-Adjusted Relative Strength vs SPY over the last 21 days.\nFormula: (ticker 21D return − SPY 21D return) ÷ ticker volatility, scaled 0–100%.\n>50 = outperforming SPY on a risk-adjusted basis.\n<50 = underperforming SPY.\n100 = strongest possible relative momentum.')
            + '</tr></thead><tbody>';

        sorted.forEach(function(r, idx) {
            var rank = idx + 1;
            var n = sorted.length;
            var prevRank = prevRankMap ? (prevRankMap[r.ticker] || null) : null;
            var delta = prevRank ? (prevRank - rank) : null;
            var r20 = r['20d'], r5 = r['5d'], rd = r['daily'];
            var c = function(v) { return v > 0 ? '#10b981' : v < 0 ? '#ef4444' : '#3d7090'; };
            var fmt = function(v) { return v != null ? (v > 0 ? '+' : '') + v.toFixed(1) + '%' : '—'; };
            var deltaHtml = delta == null ? '<span style="color:#1a3550">new</span>'
                : delta > 0 ? '<span style="color:#10b981">▲'+delta+'</span>'
                : delta < 0 ? '<span style="color:#ef4444">▼'+Math.abs(delta)+'</span>'
                : '<span style="color:#1a3550">—</span>';
            // Subtle bg for top 5 and bottom 5
            var bg = rank <= 5 ? '#07182a' : rank > n - 5 ? '#130a0a' : '';
            var borderTop = rank === n - 4 ? 'border-top:1px solid #1a3550;' : '';
            html += '<tr style="border-bottom:1px solid #070f1c;' + (bg ? 'background:'+bg+';' : '') + borderTop + '">'
                + '<td style="padding:3px 8px;color:#2d6080">'+rank+'</td>'
                + '<td style="padding:3px 8px;font-weight:600;color:#d4e4f4">'+r.ticker+'</td>'
                + '<td style="padding:3px 8px;text-align:right;color:'+c(r20)+'">'+fmt(r20)+'</td>'
                + '<td style="padding:3px 8px;text-align:right;color:'+c(r5)+'">'+fmt(r5)+'</td>'
                + '<td style="padding:3px 8px;text-align:right;color:'+c(rd)+'">'+fmt(rd)+'</td>'
                + '<td style="padding:3px 8px;text-align:right">'+deltaHtml+'</td>'
                + '<td style="padding:3px 8px;text-align:right;color:#3d7090">'+(r.rs != null ? Math.round(r.rs) : '—')+'</td>'
                + '</tr>';
        });
        html += '</tbody></table>';
        el.innerHTML = html;
    }

                var deltaStr = '';

        html += '<div style="text-align:center;padding:4px 0 2px;font-size:0.6rem;color:#1a3550">Polymarket · ' + built + '</div>';
        el.innerHTML = html;
